      - heading "3．ウィジェットの表示" [level=2] [ref=e1582]
      - paragraph [ref=e1583]: (1) ［ウィジェット］で［一覧］タブをクリックします。
      - paragraph [ref=e1584]: ウィジェットのリストが表示されます。
      - paragraph [ref=e1585]: コミュニティ管理者の場合は管理対象のコミュニティに属するウィジェットのみ表示されます。
      - paragraph [ref=e1586]
      - paragraph [ref=e1587]: (2) 行頭に表示されている目のアイコンをクリックします。
      - paragraph [ref=e1588]
      - paragraph [ref=e1589]: ウィジェットの詳細情報が表示されます。
      - paragraph [ref=e1590]
      - paragraph [ref=e1591]: 【参考】
      - paragraph [ref=e1592]: ID、Widget Type、Enableは、表示順序を変更することが可能です。
      - paragraph [ref=e1593]: 各項目名をクリックすると、表示順序が昇順、降順で変更されます。
      - paragraph [ref=e1594]: 例）ID
      - paragraph [ref=e1595]
      - paragraph [ref=e1596]: 「フィルターを追加」のプルダウンより、Repository、Widget Type、Enableについて検索が可能です。
      - paragraph [ref=e1597]: 検索条件を指定して「適用」ボタンをクリックして検索します。
      - paragraph [ref=e1598]
      - paragraph [ref=e1599]: 【注意事項】
      - paragraph [ref=e1600]: Repository、Widget Type検索条件のテキストボックスはそれぞれの名称での検索となります。
      - paragraph [ref=e1601]: 例）「フィルターを追加」でWidget Typeを選択し、条件に［含む］を選択し、テキストボックスに［Notice］を記述し検索する。
      - paragraph [ref=e1602]: 以下の画像の通り、Widget Typeが［Notice］のWidgetが表示されます。
      - paragraph [ref=e1603]
      - heading "4．ウィジェットの更新" [level=2] [ref=e1604]
      - paragraph [ref=e1605]: ウィジェットの更新は、［ウィジェット］または［ページレイアウト］で行います。
      - heading "4．1．［ウィジェット］での更新" [level=3] [ref=e1606]
      - paragraph [ref=e1607]: (1) ［ウィジェット］の［一覧］タブをクリックし、ウィジェットの行頭に表示されている鉛筆のアイコンをクリックします。
      - paragraph [ref=e1608]
      - paragraph [ref=e1609]: ［編集］タブが表示されます。
      - paragraph [ref=e1610]: (2) 項目を変更します。
      - paragraph [ref=e1611]:
        - text: 項目の説明については、「
        - link "2. ウィジェットの登録" [ref=e1612] [cursor=pointer]:
          - /url: "#m2"
        - text: 」を参照してください。
      - paragraph [ref=e1613]: (3) ［Save］をクリックします。
      - paragraph [ref=e1614]: ウィジェットが変更されます。メッセージ「Widget item updated successfully.」が編集画面の上部に表示されます。
      - heading "4．2．［ページレイアウト］での更新" [level=3] [ref=e1615]
      - paragraph [ref=e1616]: (1) ［ページレイアウト］をクリックし、PreviewまたはWidget Listの左上に表示されている歯車のアイコンをクリックします。
      - paragraph [ref=e1617]
      - paragraph [ref=e1618]: ウィジェットの編集画面が別ウィンドウで表示されます。
      - paragraph [ref=e1619]: (2) 項目を変更します。
      - paragraph [ref=e1620]:
        - text: 項目の説明については、「
        - link "2. ウィジェットの登録" [ref=e1621] [cursor=pointer]:
          - /url: "#m2"
        - text: 」を参照してください。
      - paragraph [ref=e1622]: (3) ［Save］をクリックします。
      - paragraph [ref=e1623]: ウィジェットが変更されます。メッセージ「Widget item updated successfully.」が編集画面の上部に表示されます。
      - heading "5．ウィジェットの削除" [level=2] [ref=e1624]
      - paragraph [ref=e1625]: ［一覧］タブで、ウィジェットの行頭に表示されているゴミ箱のアイコンをクリックすると、ウィジェットが削除されます。
      - paragraph [ref=e1626]
      - paragraph [ref=e1627]: メッセージ「1 レコードが正常に削除されました。」が表示されます。
      - paragraph [ref=e1628]: "※削除するウィジェットがページレイアウトに使用されている場合、メッセージ「Cannot delete widget (ID: xx, because it’s setting in Widget Design.」が表示されます。"
      - heading "6．ページの表示" [level=2] [ref=e1629]
      - paragraph [ref=e1630]: (1) ［ページレイアウト］をクリックします。
      - paragraph [ref=e1631]: (2) Repositoryのプルダウンリストで、リポジトリを選択します。
      - paragraph [ref=e1632]:
        - text: 選択したリポジトリのMainLayoutのページが表示されます。
        - text: また、Widget画面で有効（Enableがチェックあり）が設定されているウィジェットがWidget Listに表示されます。
      - paragraph [ref=e1633]
      - heading "7．ページ内のウィジェットの配置" [level=2] [ref=e1634]
      - paragraph [ref=e1635]: (1) ［ページレイアウト］をクリックします。
      - paragraph [ref=e1636]: (2) Repositoryのプルダウンリストで、リポジトリを選択します。
      - paragraph [ref=e1637]: 選択したリポジトリのMainLayoutのページが表示されます。また、Widget Listには、ウィジェットが表示されます。
      - paragraph [ref=e1638]
      - paragraph [ref=e1639]: (3) Pagesのプルダウンリストで、ウィジェットデザインを設定するページを選択します。
      - paragraph [ref=e1640]
      - paragraph [ref=e1641]: (4) Widget Listで追加するウィジェットの［Add Widget］をクリックします。
      - paragraph [ref=e1642]
      - paragraph [ref=e1643]: Previewにウィジェットが追加されます。
      - paragraph [ref=e1644]: ウィジェットをドラッグアンドドロップして位置を移動したり、サイズを変更したりできます。
      - paragraph [ref=e1645]:
        - text: 【注意事項】
        - text: ［Main Contents］、［Header］、［Footer］はページ内に複数設定できません。［Main Contents］のウィジェットを複数設定しようとした場合、エラーメッセージ「Main Content has been existed in Preview panel.」が表示されます。［Header］、［Footer］のウィジェットを複数設定しようとした場合、［Add Widget］ボタンが無効になります。
      - paragraph [ref=e1646]: (5) ウィジェットを削除する場合、Previewにある各ウィジェットの右上にある［×］をクリックします。
      - paragraph [ref=e1647]
      - paragraph [ref=e1648]: Previewからウィジェットが削除されます。
      - paragraph [ref=e1649]: (6) ［Save］をクリックします。
      - paragraph [ref=e1650]: ウィジェットが追加または削除されます。
      - paragraph [ref=e1651]:
        - text: 【注意事項】
        - text: リポジトリに対して［Main Contents］のウィジェットは１つだけ設定できます。
        - text: "［Main Contents］のウィジェットを複数ページに設定しようとした場合は、エラーメッセージ「Failed to save design: Main contents may only be set to one layout.」が表示されます。"
      - heading "8．ページの追加" [level=2] [ref=e1652]
      - paragraph [ref=e1653]: (1) ［ページレイアウト］をクリックします。
      - paragraph [ref=e1654]: (2) Repositoryのプルダウンリストで、ページを登録したいリポジトリを選択します。
      - paragraph [ref=e1655]: (3) Pagesのプルダウンリストの右に表示されている［＋］アイコンをクリックします。
      - paragraph [ref=e1656]
      - paragraph [ref=e1657]: Pageダイアログが表示されます。
      - paragraph [ref=e1658]: (4) URLと言語ごとのタイトルを設定して［Save］をクリックします。
      - paragraph [ref=e1659]: ページが追加されます。Pagesのプルダウンリストに、追加したPageのTitleが表示されます。
      - paragraph [ref=e1660]
      - paragraph [ref=e1661]:
        - text: URLは必須項目です。
        - text: URLを入力しない場合、エラーメッセージ「Not a valid URL.」が表示されます。
      - paragraph [ref=e1662]
      - paragraph [ref=e1663]: "選択しているリポジトリがコミュニティの場合は、入力したURLの前に「/c/{community_id}/page」の形式でプレフィックスを自動的に付与します。"
      - paragraph [ref=e1664]
      - paragraph [ref=e1665]: 初期値「/」を削除して、外部URLを設定することも可能です。外部URLを設定したページを［Menu］ウィジェットにセットすることで、外部ページへのリンクとして機能します。
      - paragraph [ref=e1666]
      - paragraph [ref=e1667]: 追加したページは、ウィジェットの「メニュー」を配置することで、各ページのリンクを表示し、各ページへ遷移することができます。メニューに表示するページは「メニュー」ウィジェットの編集時に指定することができます。
      - heading "9．ページの更新" [level=2] [ref=e1668]
      - paragraph [ref=e1669]: (1) ［ページレイアウト］をクリックします。
      - paragraph [ref=e1670]: (2) Pagesのプルダウンリストの右に表示されている［鉛筆アイコン］をクリックします。
      - paragraph [ref=e1671]
      - paragraph [ref=e1672]: Pageダイアログが表示されます。
      - paragraph [ref=e1673]:
        - text: 詳細は「
        - link "8．ページの追加」(4)" [ref=e1674] [cursor=pointer]:
          - /url: "#m8"
        - text: 以降を参照してください。
      - heading "10．ページの削除" [level=2] [ref=e1675]
      - paragraph [ref=e1676]: (1) ［ページレイアウト］をクリックします。
      - paragraph [ref=e1677]: (2) Pagesのプルダウンリストの右に表示されている［ゴミ箱アイコン］をクリックします。
      - paragraph [ref=e1678]: ※Main Layoutのページは削除できません。
      - paragraph [ref=e1679]
      - paragraph [ref=e1680]: 削除確認用のダイアログが表示されます。
      - paragraph [ref=e1681]
      - paragraph [ref=e1682]: (2) ［Submit］をクリックします。
      - paragraph [ref=e1683]: ページが削除され、メッセージ「Successfully deleted page.」が表示されます。
      - heading "11．背景色の設定" [level=2] [ref=e1684]
      - paragraph [ref=e1685]: ウィジェット以外のWebページ全体の背景色を変更することができます。
      - paragraph [ref=e1686]: (1) ログイン後、［Administration］にアクセスします。
      - paragraph [ref=e1687]: (2) ［設定］をクリックして［画面背景色］をクリックします。
      - paragraph [ref=e1688]: カラーパレットが表示されます。
      - paragraph [ref=e1689]
      - paragraph [ref=e1690]: (3) 表示されたカラーパレットから背景色を選択します。
      - paragraph [ref=e1691]
      - paragraph [ref=e1692]: 数値でも背景色を設定できます。
      - paragraph [ref=e1693]: ・RGBのカラーモデルで背景色を設定します。
      - paragraph [ref=e1694]:
        - text: それぞれのR、G、BテキストボックスにRGB値を指定します。
        - text: 指定されたRGB値に応じて、背景色が自動表示されます。
      - paragraph [ref=e1695]
      - paragraph [ref=e1696]: ・HSLのカラーモデルで背景色を設定します。
      - paragraph [ref=e1697]:
        - text: RGBと表示されるバーをクリックすると背景色設定方法が切り替わるので、HSLが表示されるまでクリックします。
        - text: それぞれのH、S、LテキストボックスにHSLパーセント値を指定します。
        - text: 指定されたHSLパーセント値に応じて、背景色が自動表示されます。
      - paragraph [ref=e1698]
      - paragraph [ref=e1699]: ・HEXで背景色を設定します。
      - paragraph [ref=e1700]:
        - text: RGBと表示されるバーを、HEXが表示されるまでクリックします。
        - text: HEXテキストボックスにカラーコードを指定します。
        - text: 指定されたカラーコードに応じて、背景色が自動表示されます。
      - paragraph [ref=e1701]
      - paragraph [ref=e1702]: (4) ［保存］をクリックします。
      - paragraph [ref=e1703]: 設定が保存されます。
      - heading "12．Faviconの設定" [level=2] [ref=e1704]
      - paragraph [ref=e1705]: (1) ログイン後、［Administration］にアクセスします。
      - paragraph [ref=e1706]: (2) ［設定］をクリックして［サイト情報］をクリックします。
      - paragraph [ref=e1707]: サイト情報の設定画面が表示されます。
      - paragraph [ref=e1708]
      - paragraph [ref=e1709]: (3) ［アイコンファイルの選択］をクリックします。
      - paragraph [ref=e1710]: 「アイコンファイルの選択」ダイアログが表示されます。選択できるアイコンの拡張子は「.ico」です。
      - paragraph [ref=e1711]: (4) 表示された「アイコンファイル選択」ダイアログでアイコンを選択した後、［開く］ボタンをクリックします。
      - paragraph [ref=e1712]: 選択されたアイコン名とアイコンが表示されます。
      - paragraph [ref=e1713]
      - paragraph [ref=e1714]: (5) ［保存］をクリックします。
      - paragraph [ref=e1715]: 設定が保存されます。
