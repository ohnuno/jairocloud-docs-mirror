        - link "2．2．ファセット検索" [ref=e1731] [cursor=pointer]:
          - /url: "#m2.2"
        - link "2．3．IIIF機能" [ref=e1732] [cursor=pointer]:
          - /url: "#m2.3"
      - paragraph [ref=e1733]: 本ページでは、WEKO3で試験的に追加された機能について説明します。
      - heading "1．アイテムの全件エクスポート" [level=2] [ref=e1734]
      - paragraph [ref=e1735]: JAIRO Cloudに登録されたアイテムのメタデータを全件エクスポートすることができます。
      - paragraph [ref=e1736]: 全件エクスポートは、図書館員以上の権限をもつユーザーだけが実行できます。手順は以下の通りです。
      - paragraph [ref=e1737]: ※全件出力にはかなりの時間とサーバ負荷が発生します。サーバ負荷の状況によっては失敗することもあるため、現時点では1000件に区切って出力頂くことを推奨しております。
      - paragraph [ref=e1738]: (1) ログイン後、［Administration］にアクセスし、［アイテム管理］をクリックして［一括エクスポート］をクリックします。
      - paragraph [ref=e1739]: 全件エクスポートの画面が表示されます。
      - list [ref=e1740]:
        - listitem [ref=e1741]: ［アイテムタイプ］を選択すると指定したアイテムタイプのアイテムをエクスポートします。
        - listitem [ref=e1742]: アイテムIDを指定すると、指定したアイテムID範囲のアイテムをエクスポートできます。
      - paragraph [ref=e1743]
      - paragraph [ref=e1744]: アイテムIDの1から1000までを出力する例。
      - paragraph [ref=e1745]
      - paragraph [ref=e1746]: (2) ［エクスポート］をクリックします。
      - paragraph [ref=e1747]: クリックすると、全件出力を実行してよいかの確認ダイアログが表示されます。
      - paragraph [ref=e1748]
      - paragraph [ref=e1749]: (3) ［実行］をクリックします。全件エクスポート処理が実行されます。
      - paragraph [ref=e1750]
      - paragraph [ref=e1751]:
        - text: ※他のユーザーが全件エクスポート実行中の場合、［エクスポート］ボタンが非活性となり、クリックすることができません。
        - text: ※確認ダイアログで［キャンセル］をクリックすると、全件エクスポートを行わなず、確認ダイアログを閉じます。
      - paragraph [ref=e1752]: 正常に処理が完了するとダウンロードURLが画面上に表示されます。
      - paragraph [ref=e1753]: URLをクリックするとzipファイル(export-all.zip)がダウンロードされます。
      - paragraph [ref=e1754]
      - paragraph [ref=e1755]: ※全件エクスポートの実行中に［キャンセル］をクリックすると、全件エクスポートの処理を中止してよいかの確認ダイアログが表示されます。
      - paragraph [ref=e1756]
      - list [ref=e1757]:
        - listitem [ref=e1758]: ［実行］をクリックすると、アイテムの全件エクスポートを中止し、確認ダイアログを閉じます。
        - listitem [ref=e1759]: ［キャンセル］をクリックすると、アイテムの全件エクスポートを続行し、確認ダイアログを閉じます。
      - paragraph [ref=e1760]: エクスポートファイルの構成は以下のとおりです。
      - paragraph [ref=e1761]: 出力されるtsvファイルは、「アイテムタイプ名（アイテムタイプID）」の形でアイテムタイプ毎にtsvファイルが出力されます。
      - paragraph [ref=e1762]: 各アイテムのコンテンツファイルは出力されません。
      - paragraph [ref=e1763]
      - heading "2．その他の試験的機能" [level=2] [ref=e1764]
      - paragraph [ref=e1765]: 下記の機能は試験的な機能となっており、用途が限定されております。ドキュメント整備、また使用にはいくつか制限事項があります。
      - paragraph [ref=e1766]:
        - text: これらの機能については、wekosoftware ( at )
        - link "nii.ac.jp" [ref=e1767] [cursor=pointer]:
          - /url: http://nii.ac.jp/
        - text: にお問い合わせください。
      - heading "2．1．制限公開機能" [level=3] [ref=e1768]
      - paragraph [ref=e1769]: 利用者からの申請をもとに、ファイルコンテンツを公開する機能です。
      - paragraph [ref=e1770]: ログイン後、［Administration］にアクセスし、［設定］をクリックして［制限公開］をクリックします。
      - paragraph [ref=e1771]: 制限公開機能の画面が表示されます。
      - paragraph [ref=e1772]
      - heading "2．1．1．コンテンツファイルのダウンロード" [level=4] [ref=e1773]
      - paragraph [ref=e1774]: アイテム詳細画面の「申請」ボタンから起動したワークフローが「作業済み(Done)」となった際にダウンロード用のURIがメールで通知されますが、当該ダウンロードリンクに有効期限とダウンロード回数を設けることができます。
      - paragraph [ref=e1775]:
        - text: ・有効期限
        - text: 初期値は30日です。ダウンロードリンクの有効期限は承認者が承認した時点で設定されます。有効期限を無期限に設定するには、「無制限にする」チェックボックスにチェックを入れてください。（※システム上では9999999日が設定されます）
        - text: 有効期限が未設定かつ「無期限にする」チェックボックスをチェックしていない場合はエラーとなります。
      - paragraph [ref=e1776]:
        - text: ・ダウンロード回数
        - text: 初期値は10回です。ダウンロードが途中で失敗した場合でも、1回のダウンロードとしてカウントされます。ダウンロード回数を無限に設定するには、「無制限にする」チェックボックスにチェックを入れてください。（※システム上では9999999日が設定されます）
        - text: ダウンロード回数が未設定かつ「無期限にする」チェックボックスをチェックしていない場合はエラーとなります。
        - text: ダウンロードリンクからコンテンツファイルのダウンロードした際、利用統計のダウンロード回数に加算されます。
        - text: 有効期限、ダウンロード回数を超過してダウンロードリンクにアクセスした場合はエラーページを表示します。
      - paragraph [ref=e1777]: ■有効期限を超過した場合のメッセージ
      - paragraph [ref=e1778]
      - paragraph [ref=e1779]: ■上限回数を超過した場合のメッセージ
      - paragraph [ref=e1780]
      - paragraph [ref=e1781]: なお、登録時にアイテムを公開状態としていて、途中で非公開/削除した場合、ダウンロード期間内でもファイルはダウンロードできなくなります。また、登録時に指定したインデックスを非公開に変更した場合も、ダウンロード期間内でもファイルはダウンロードできなくなります。
      - heading "2．1．2．利用報告ワークフローへのアクセス" [level=4] [ref=e1782]
      - paragraph [ref=e1783]: 制限公開で登録したコンテンツファイルをダウンロードした際に、非ログインユーザが利用報告ワークフローにアクセスできる有効期限を設定することができます。
      - paragraph [ref=e1784]:
        - text: ・有効期限
        - text: 初期値は500日です。有効期限を無期限に設定するには、「無制限にする」チェックボックスにチェックを入れてください。（※システム上では9999999日が設定されます）
        - text: 設定された有効期限を超過した場合、対象の利用報告ワークフローのステータスを「キャンセル」に自動で更新します。
        - text: 設定された有効期限を超過したリンクにアクセスした場合は、エラーページを表示します。
      - heading "2．1．3．利用規約" [level=4] [ref=e1785]
      - paragraph [ref=e1786]: ワークフローの利用規約のプルダウンで選択できるテンプレートを設定することができます。
      - paragraph [ref=e1787]:
        - text: ・利用規約名一覧
        - text: WEKO3の表示言語設定に合わせて利用規約名を一覧に表示します。言語が日本語以外の場合は英語の利用規約名を表示します。
        - text: 利用規約名の右端に「×」を設け、押下すると削除対象となり、「保存」ボタン押下時に削除が確定されます。
        - text: ［＋Add］ボタンを押下すると、新規に利用規約を登録できます。
      - paragraph [ref=e1788]:
        - text: ・日本語利用規約名入力エリア
        - text: 日本語の利用規約名を設定するテキストボックスです。アイテム登録時にWEKO3の表示言語設定が日本語の場合、選択肢として表示されます。
      - paragraph [ref=e1789]:
        - text: ・日本語利用規約文言入力エリア
        - text: 登録する利用規約（日本語）の文言を入力するテキストエリアです。文字数上限はありません。
      - paragraph [ref=e1790]:
        - text: ・英語利用規約名入力エリア
        - text: 英語の利用規約名を設定するテキストボックスです。アイテム登録時にWEKO3の表示言語設定が日本語以外の場合、選択肢として表示されます。
      - paragraph [ref=e1791]:
        - text: ・英語利用規約文言入力エリア
        - text: 登録する利用規約（英語）の文言を入力するテキストエリアです。文字数上限はありません。
      - heading "2．1．4．利用報告督促メール" [level=4] [ref=e1792]
      - paragraph [ref=e1793]: 利用報告督促メールを送信した履歴が表示されます。アクティビティのリンクを押下すると、該当のワークフローが起動します。
      - paragraph [ref=e1794]: 【補足】
      - paragraph [ref=e1795]: ゲストユーザーでの申請作業と承認者作業を同一ブラウザ環境で実施するとサーバーエラーが発生します。（異なるクライアントPCから実施した場合はエラー発生しません。）
      - paragraph [ref=e1796]: 承認作業でサーバーエラーが発生する場合、一度作業ブラウザからログアウト、再ログインしてから承認作業を行ってください。
