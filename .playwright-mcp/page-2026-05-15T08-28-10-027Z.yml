      - paragraph [ref=e4616]: ［Identifier Grant］画面に管理画面の［Identifier］で設定しているプレフィックスと同画面で設定しているサフィックスの前半部分を表示し、サフィックスの後半部分を［入力欄］テキストボックスに入力します。
      - paragraph [ref=e4617]: ［入力形式］
      - list [ref=e4618]:
        - listitem [ref=e4619]: 半角英数字または半角記号「_-.;()/」のみ入力されている
        - listitem [ref=e4620]: 「info:doi/[DOIのPrefix]/[入力値]」が255文字以内である
        - listitem [ref=e4621]: 他のアイテムで既に使用されているDOIではない
        - listitem [ref=e4622]: 取り下げられたDOIではない
      - paragraph [ref=e4623]
      - paragraph [ref=e4624]:
        - strong [ref=e4625]: 自由入力
      - paragraph [ref=e4626]: ［Identifier Grant］画面に管理画面の［Identifier］で設定しているプレフィックスを表示し、サフィックスを［入力欄］テキストボックスに入力します。
      - paragraph [ref=e4627]: 入力値は［半自動入力の方法］での［入力形式］でチェックされます。
      - paragraph [ref=e4628]
      - heading "３．５．アイテム承認" [level=2] [ref=e4629]
      - paragraph [ref=e4630]:
        - text: アイテムを承認できるのは、「図書館員」の権限を持つユーザーです。
        - text: 登録者の承認待ちである登録するアイテムに対し、「却下」、「保存」、「承認」 を行うことができます。
      - paragraph [ref=e4631]:
        - text: 図書館員以外が承認できる場合は以下が存在します。
        - text: フローの承認者に特定のロールが設定されていた場合：選択されているロールのユーザーが承認することができます。
        - text: フローの承認者に特定のユーザーが設定されていた場合：選択されているユーザーが承認することができます。
      - paragraph [ref=e4632]: アイテムの承認は［ワークフロー］画面から実施します。
      - paragraph [ref=e4633]: (1) ［ToDo］タブ、［Wait］タブ、または［All］タブのいずれかを選択します。
      - paragraph [ref=e4634]
      - paragraph [ref=e4635]: 査読／承認の権限がない場合は、次の画面が表示されます。
