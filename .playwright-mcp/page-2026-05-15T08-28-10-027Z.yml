      - heading "あ行" [level=2] [ref=e1982]
      - heading "アイテム" [level=3] [ref=e1983]
      - paragraph [ref=e1984]: リポジトリに保管する情報の１単位。アイテムを構成するデータは、コンテンツファイルおよびメタデータ。メタデータには、メタデータスキーマに規定されている記述項目や記述形式に準拠した情報が記載されています。
      - paragraph [ref=e1985]: 各アイテムにはWEKO3リポジトリ内で一意となるアイテムIDが割り当てられます。アイテムは1つのアイテムタイプに紐付いており、複数のアイテムタイプと紐付けることはできません。
      - paragraph [ref=e1986]: 異なるメタデータで構成させるアイテムを登録したい場合、新たなアイテムタイプを作成することで対応できます。
      - heading "アイテムタイプ" [level=3] [ref=e1987]
      - paragraph [ref=e1988]: アイテムに登録するメタデータのデータ型を定義します。アイテムタイプは、JPCOARなどのメタデータスキーマで規定される要素から構成されます。
      - paragraph [ref=e1989]: リポジトリ管理者はアイテムに必要なメタデータを検討し、アイテムタイプを独自に作成します。
      - paragraph [ref=e1990]: 例）
      - paragraph [ref=e1991]: 紀要論文と研究データをリポジトリに保管する場合、紀要論文のメタデータ項目と研究データのメタデータ項目は異なります。このような場合に、紀要論文向けのアイテムタイプと、研究データ向けのアイテムタイプをそれぞれ作成できます。
      - list [ref=e1992]:
        - listitem [ref=e1993]: 紀要論文 / Departmental Bulletin Paper
        - listitem [ref=e1994]: 研究データ / dataset
      - paragraph [ref=e1995]: "[ 参考 ]"
      - paragraph [ref=e1996]: ・デフォルトのアイテムタイプでは、以下のいずれかの資源タイプ（dc:type）を選択することで、登録したコンテンツを CiNii で検索できるようになります。（※2）
      - table [ref=e1997]:
        - rowgroup [ref=e1998]:
          - row "CiNii Research conference paper（会議発表論文） data paper（データ論文） departmental bulletin paper（紀要論文） editorial（エディトリアル） journal article（学術雑誌論文） periodical（逐次刊行物） review article（レビュー論文） article（記事） newspaper（新聞） software paper（ソフトウェア論文）" [ref=e1999]:
            - columnheader "CiNii Research" [ref=e2000]
            - columnheader "conference paper（会議発表論文） data paper（データ論文） departmental bulletin paper（紀要論文） editorial（エディトリアル） journal article（学術雑誌論文） periodical（逐次刊行物） review article（レビュー論文） article（記事） newspaper（新聞） software paper（ソフトウェア論文）" [ref=e2001]
        - rowgroup [ref=e2002]:
          - row "CiNii Dissertations thesis（学位論文） doctoral thesis（博士論文）" [ref=e2003]:
            - cell "CiNii Dissertations" [ref=e2004]
            - cell "thesis（学位論文） doctoral thesis（博士論文）" [ref=e2005]
      - paragraph [ref=e2006]: ・登録したコンテンツ（博士論文）を国立国会図書館へ提出するには、資源タイプ（dc:type）を「doctoral thesis」にする必要があります。（※3）
      - paragraph [ref=e2007]: ※２、※3 CiNii での検索や、博士論文の国立国会図書館への提出には、他にも条件があります。
      - paragraph [ref=e2008]:
        - text: 学術機関リポジトリ構築連携支援事業の Web サイト （
        - link "https://www.nii.ac.jp/irp/archive/system/irdb_harvest.html" [ref=e2009] [cursor=pointer]:
          - /url: https://www.nii.ac.jp/irp/archive/system/irdb_harvest.html
        - text: ）参照。
      - heading "異体字" [level=3] [ref=e2010]
      - paragraph [ref=e2011]:
        - text: 旧字などで、読み方と意味が同じで表記の異なる字体、文字のことです。
        - text: 例）「会」と「會」、「一」と「壱」など。
      - heading "一括登録／インポート" [level=3] [ref=e2012]
      - paragraph [ref=e2013]: JAIRO Cloud に複数のコンテンツをまとめて登録することです。
      - heading "インデックス" [level=3] [ref=e2014]
      - paragraph [ref=e2015]: WEKO3リポジトリに登録したアイテムをまとめる単位（カテゴリ）。WEKO3リポジトリに登録したアイテムは必ず1つ以上のインデックスに所属します。複数の子インデックスとアイテムを持つことができます。
      - heading "インデックスツリー" [level=3] [ref=e2016]
      - paragraph [ref=e2017]: 入れ子的に作成されたインデックスのツリー構造。1つのWEKO3リポジトリは1つのインデックスツリーを持ちます。
      - heading "か行" [level=2] [ref=e2018]
      - heading "機関管理者" [level=3] [ref=e2019]
      - paragraph [ref=e2020]:
        - text: その機関で最初に登録された JAIRO Cloud のユーザーアカウントのことです。「図書館員」の権限を持つ。（「
        - link "図書館員" [ref=e2021] [cursor=pointer]:
          - /url: "#m-toshokanin"
        - text: 」の項目を参照）。
      - heading "教員" [level=3] [ref=e2022]
      - paragraph [ref=e2023]: JAIRO Cloud で使用するユーザーアカウントの権限の1つ。「コンテンツの登録」はできますが、「JAIRO Cloud のデザイン変更」、「ユーザーアカウントの管理」、「リポジトリの管理（各種設定）」はできません。
      - 'heading "クリエイティブ・コモンズ・ライセンス／Creative Commons licenses（略称: CC ライセンス、シーシーライセンス）" [level=3] [ref=e2024]'
      - paragraph [ref=e2025]: インターネット時代のための新しい著作権ルール。CC ライセンスと略称されます。 このライセンスを利用すると、作者は著作権を保持したまま作品を自由に流通させることができ、受け手はライセンス条件の範囲内で再配布やリミックスなどができます。
      - paragraph [ref=e2026]: CC ライセンスには、以下の6種類があります。
      - list [ref=e2027]:
        - listitem [ref=e2028]: 表示（CC BY）
        - listitem [ref=e2029]: 表示-継承（CC BY-SA）
        - listitem [ref=e2030]: 表示-改変禁止（CC BY-ND）
        - listitem [ref=e2031]: 表示-非営利（CC BY-NC）
        - listitem [ref=e2032]: 表示-非営利-継承（CC BY-NC-SA）
        - listitem [ref=e2033]: 表示-非営利-改変禁止（CC BY-NC-ND）
      - paragraph [ref=e2034]:
        - text: 詳細は、クリエイティブ・コモンズ・ジャパンの Web サイト（
        - link "https://creativecommons.jp/" [ref=e2035] [cursor=pointer]:
          - /url: https://creativecommons.jp/
        - text: ）参照。
      - heading "個別登録" [level=3] [ref=e2036]
      - paragraph [ref=e2037]: JAIRO Cloud にコンテンツを1件ずつ登録することです。
      - heading "コンテンツ" [level=3] [ref=e2038]
      - paragraph [ref=e2039]: JAIRO Cloud に登録する「論文などの本文ファイル」と「メタデータ」のセット。アイテムとも呼びます。
      - heading "コンテンツファイル" [level=3] [ref=e2040]
      - paragraph [ref=e2041]: アイテムを構成する論文などのファイルのことです。
      - heading "さ行" [level=2] [ref=e2042]
      - heading "スキーマ" [level=3] [ref=e2043]
      - paragraph [ref=e2044]: リポジトリのデータベースの構造の定義です。データベースを構成するテーブルやリストといったオブジェクトの関係を定義しています。
      - heading "た行" [level=2] [ref=e2045]
      - heading "図書館員" [level=3] [ref=e2046]
      - paragraph [ref=e2047]: JAIRO Cloud で使用するユーザーアカウントの権限の1つ。「コンテンツの登録」、「JAIRO Cloud のデザイン変更」、「ユーザーアカウントの管理」、「リポジトリの管理（各種設定）」の全てを行うことができます。
      - heading "は行" [level=2] [ref=e2048]
      - heading "ハーベスト／ハーベスティング" [level=3] [ref=e2049]
      - paragraph [ref=e2050]: 外部システムがリポジトリのデータを定期的に収集することです。専用のプロトコルを使用します。メタデータをプロトコルにマッピングする必要があります。
      - heading "ホスト名" [level=3] [ref=e2051]
      - paragraph [ref=e2052]: JAIRO Cloud の URL「https://XXX.repo.nii.ac.jp/」で、「XXX」の部分のことです。
      - paragraph [ref=e2053]: （例）JAIRO Cloud の URL が https://test.repo.nii.ac.jp/ の場合、「test」がホスト名。
      - heading "プロパティ" [level=3] [ref=e2054]
      - paragraph [ref=e2055]: 「管理画面 > Item Types > Metadata」の「属性」欄に表示される「日付」や「タイトル」等メタデータ項目の属性を指します。「日付プロパティ」、「タイトルプロパティ」等と呼びます。
      - heading "フロー" [level=3] [ref=e2056]
      - paragraph [ref=e2057]: アイテムをシステムに保存するまでの一連の作業をグループ化したもの。リポジトリへのデータの追加、メタデータの入力、査読・承認といった作業を定義します。
      - heading "ま行" [level=2] [ref=e2058]
      - heading "マッピング" [level=3] [ref=e2059]
      - paragraph [ref=e2060]: アイテムタイプの属性に、スキーマとの関連づけを設定することです。
      - paragraph [ref=e2061]: ハーベストなどの際は、マッピングの設定に基づきメタデータが出力されます。
      - heading "メタデータ" [level=3] [ref=e2062]
      - paragraph [ref=e2063]: アイテムに関連した情報です。例えば、タイトル、著者、ファイルサイズなどの情報が該当します。
      - paragraph [ref=e2064]: メタデータは、内容メタデータ、管理メタデータから構成されます。
      - list [ref=e2065]:
        - listitem [ref=e2066]: 内容メタデータ：アイテムを要約した内容
        - listitem [ref=e2067]: 管理メタデータ：内容メタデータの作成者や、アイテムのアクセス数などの情報
      - heading "ら行" [level=2] [ref=e2068]
      - heading "ログイン" [level=3] [ref=e2069]
      - paragraph [ref=e2070]: コンピュータやインターネット上の様々なサービスを利用する際に、予め登録しておいたアカウント情報を用いて個々人のデータにアクセスする認証行為を指します。
      - heading "ログアウト" [level=3] [ref=e2071]
      - paragraph [ref=e2072]: ログインによって認証された個々人のデータにアクセスするための権限を失効することです。
      - heading "ロール" [level=3] [ref=e2073]
      - paragraph [ref=e2074]: JAIRO Cloud（WEKO3）を操作するための権限です。
      - paragraph [ref=e2075]:
        - text: （JAIRO Cloudアカウントが紐づくロールについては「ユーザーアカウント管理」の「
        - link "3．ユーザーアカウントの追加" [ref=e2076] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/user-account/#m-3
        - text: 」参照。）
      - heading "わ行" [level=2] [ref=e2077]
      - heading "ワークフロー" [level=3] [ref=e2078]
      - paragraph [ref=e2079]: 業務の一連の処理手続きを定義すること、またその業務の一連の流れを指します。WEKO3リポジトリのワークフローは、アイテムの登録から公開までの一連の操作（リポジトリへのデータの追加、メタデータの入力、査読・承認を含む）を指します。
      - heading "アルファベット" [level=2] [ref=e2080]
      - heading "CiNii（サイニィー）" [level=3] [ref=e2081]
      - paragraph [ref=e2082]: 論文、図書・雑誌、博士論文などの学術情報を検索できるデータベース・サービス。
      - paragraph [ref=e2083]:
        - text: CiNii：
        - link "https://ci.nii.ac.jp/" [ref=e2084] [cursor=pointer]:
          - /url: https://ci.nii.ac.jp/
      - paragraph [ref=e2085]: JAIRO Cloud に登録されたコンテンツの一部も、CiNii から検索することができます。
      - paragraph [ref=e2086]:
        - text: JAIRO Cloud のコンテンツが CiNii で検索されるための条件は、「
        - link "アイテムタイプ" [ref=e2087] [cursor=pointer]:
          - /url: "#m-itemtype"
        - text: 」の項目を参照。
      - heading "DDI" [level=3] [ref=e2088]
      - paragraph [ref=e2089]:
        - text: DDI（Data Documentation Initiative）は、データアーカイブの国際化や、共同利用・共同研究拠点といった事業の一環で利用する、社会調査メタデータの国際規格のメタデータスキーマです（
        - link "https://ddialliance.org/" [ref=e2090] [cursor=pointer]:
          - /url: https://ddialliance.org/
        - text: ）。
        - text: WEKO3モジュールでは、OAI-PMHのメタデータスキーマとしてDDIを使用できます。
      - heading "DOI（Digital Object Identifier） ディーオーアイ" [level=3] [ref=e2091]
      - paragraph [ref=e2092]: コンテンツごとにつけられる識別子（URI）。DOIをコンテンツの所在情報とともに管理することによって、コンテンツへのリンク切れを防止し、永続的なアクセスが可能になります。
      - paragraph [ref=e2093]: DOIは、プレフィックス（Prefix）とサフィックス（Suffix）をスラッシュ（/）で結合した形で記述されます。
      - paragraph [ref=e2094]
      - list [ref=e2095]:
        - listitem [ref=e2096]: Prefix： 機関固有の番号
        - listitem [ref=e2097]: Suffix： コンテンツ固有の番号
      - paragraph [ref=e2098]: NII が取り纏めるJaLC準会員の場合、「JaLC DOI」と「Crossref DOI」の利用申請をすることで、「JaLC DOI」「Crossref DOI」それぞれの Prefix が割り当てられます。各Prefix を使用して「JaLC DOI」「Crossref DOI」を付与することができます。
      - paragraph [ref=e2099]:
        - text: NIIが取り纏めるJaLC準会員の詳細は、学術機関リポジトリ構築連携支援事業のWebサイト（
        - link "https://www.nii.ac.jp/irp/archive/system/jalc.html" [ref=e2100] [cursor=pointer]:
          - /url: https://www.nii.ac.jp/irp/archive/system/jalc.html
        - text: ）を参照。
      - heading "DublinCore" [level=3] [ref=e2101]
      - paragraph [ref=e2102]:
        - text: 国際標準（ISO 15836）のメタデータスキーマです（
        - link "https://www.dublincore.org/" [ref=e2103] [cursor=pointer]:
          - /url: https://www.dublincore.org/
        - text: ）。WEKO3モジュールでは、OAI-PMHのメタデータスキーマとしてDublinCoreを使用できます。
      - heading "ERDB-JP（イーアールディービー ジェーピー）" [level=3] [ref=e2104]
      - paragraph [ref=e2105]: 日本で刊行された電子リソースのデータ共有サービス。
      - paragraph [ref=e2106]:
        - text: ERDB-JP：
        - link "https://erdb-jp.nii.ac.jp/" [ref=e2107] [cursor=pointer]:
          - /url: https://erdb-jp.nii.ac.jp/
      - heading "JPCOAR（ジェーピーコア）スキーマ" [level=3] [ref=e2108]
      - paragraph [ref=e2109]:
        - text: "オープンアクセスリポジトリ推進協会（JPCOAR : Japan Consortium for Open Access Repositories）が策定したメタデータスキーマです（"
        - link "https://schema.irdb.nii.ac.jp/ja" [ref=e2110] [cursor=pointer]:
          - /url: https://schema.irdb.nii.ac.jp/ja
        - text: ）。
        - text: WEKO3モジュールでは、OAI-PMHのメタデータスキーマとしてJPCOARスキーマを使用できます。
      - heading "junii2（ジュニーツー）" [level=3] [ref=e2111]
      - paragraph [ref=e2112]:
        - text: 国立情報学研究所（NII）が公開したメタデータスキーマです（
        - link "http://www.nii.ac.jp/irp/archive/system/junii2.html）。" [ref=e2113] [cursor=pointer]:
          - /url: http://www.nii.ac.jp/irp/archive/system/junii2.html%EF%BC%89%E3%80%82
        - text: WEKO3リポジトリでは、OAI-PMHのメタデータスキーマとしてjunii2は使用しません。
      - heading "NII 資源タイプ（エヌアイアイ シゲンタイプ）" [level=3] [ref=e2114]
      - paragraph [ref=e2115]: junii2のデータ要素の1つである、「国立情報学研究所メタデータ主題語彙集」のことです。コンテンツの資料種別を表します。
      - paragraph [ref=e2116]:
        - text: 「junii2 ガイドライン Ver3.1」（
        - link "https://www.nii.ac.jp/irp/archive/system/pdf/junii2guide_ver3.1.pdf" [ref=e2117] [cursor=pointer]:
          - /url: https://www.nii.ac.jp/irp/archive/system/pdf/junii2guide_ver3.1.pdf
        - text: ）の「20. 国立情報学研究所メタデータ主題語彙集（資源タイプ）」参照。
      - heading "OAI-PMH" [level=3] [ref=e2118]
      - paragraph [ref=e2119]:
        - text: OAI-PMH（The Open Archives Initiative Protocol for Metadata Harvesting）は、リポジトリ間でメタデータを交換する目的でOpen Archives Initiativeによって開発されたプロトコルです（
        - link "http://www.openarchives.org/OAI/openarchivesprotocol.html" [ref=e2120] [cursor=pointer]:
          - /url: http://www.openarchives.org/OAI/openarchivesprotocol.html
        - text: ）。リポジトリを含む外部システムは、WEKO3モジュールに登録されたアイテムのメタデータをOAI-PMHを利用して収集できます。
      - heading "WEKO3リポジトリ" [level=3] [ref=e2121]
      - paragraph [ref=e2122]: WEKO3モジュールおよび関連ソフトを用いて構築したリポジトリ。
      - separator [ref=e2123]
      - heading "ハーベスティング管理 | オープンアクセスリポジトリ推進協会（JPCOAR）" [level=1] [ref=e2124]
      - paragraph [ref=e2125]:
