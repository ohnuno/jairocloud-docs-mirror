      - paragraph [ref=e2425]: 必須項目を入力しない場合、インデックスが追加されずに、［必須入力項目を入力してください］というエラーメッセージが表示されます。また、必須項目の直下にエラーメッセージも表示されます。
      - paragraph [ref=e2426]
      - heading "4．インデックスの更新" [level=2] [ref=e2427]
      - paragraph [ref=e2428]: ログイン後［Administration］にアクセスし、［インデックスツリー管理］＞［ツリー編集］でインデックスを選択して、［インデックス編集］に情報を入力します。
      - paragraph [ref=e2429]:
        - text: インデックスの入力項目については、「
        - link "3．インデックスの登録」(2)" [ref=e2430] [cursor=pointer]:
          - /url: "#m3-2"
        - text: 以降を参照してください。
      - paragraph [ref=e2431]: ※インデックスにDOIが付与されているアイテムが紐づいている場合、インデックスを非公開にすることはできません。また、ハーベストを非公開にすることもできません。
      - paragraph [ref=e2432]
      - heading "5．インデックスの削除" [level=2] [ref=e2433]
      - paragraph [ref=e2434]:
        - strong [ref=e2435]: JAIRO Cloud（WEKO3）の不具合により、インデックスの削除を行うことができません。
        - text: （2025年11月17日現在継続中）
      - paragraph [ref=e2436]:
        - text: 不具合の詳細は
        - link "JAIRO Cloud事務局からのお知らせ" [ref=e2437] [cursor=pointer]:
          - /url: https://meatwiki.nii.ac.jp/confluence/spaces/JAIROCloudWEKO3/pages/188875864/JAIRO+Cloud%E4%BA%8B%E5%8B%99%E5%B1%80%E3%81%8B%E3%82%89%E3%81%AE%E3%81%8A%E7%9F%A5%E3%82%89%E3%81%9B#JAIROCloud%E4%BA%8B%E5%8B%99%E5%B1%80%E3%81%8B%E3%82%89%E3%81%AE%E3%81%8A%E7%9F%A5%E3%82%89%E3%81%9B-%E3%80%90%E9%87%8D%E8%A6%81%E3%83%BB%E5%A0%B1%E5%91%8A%E3%80%91%EF%BC%88JAIROCloud%EF%BC%89%E3%82%A4%E3%83%B3%E3%83%87%E3%83%83%E3%82%AF%E3%82%B9%E3%81%AE%E5%89%8A%E9%99%A4%E5%81%9C%E6%AD%A2%E3%81%AE%E3%81%8A%E9%A1%98%E3%81%84
        - text: をご確認ください。
      - paragraph [ref=e2438]:
        - strong [ref=e2439]: 公開済みのインデックスを削除したい場合、代わりにインデックスを非公開にすることでご対応ください。
      - paragraph [ref=e2440]:
        - strong [ref=e2441]:
          - text: インデックスの非公開設定は、当該インデックスの編集画面で、
          - link "[インデックス編集]の項目" [ref=e2442] [cursor=pointer]:
            - /url: "#m3-table"
          - text: の「公開」＞[公開する]のチェックマークを外すことでできます。
      - paragraph [ref=e2443]: なお、不具合が解消した場合は、以下の手順で削除することができます。
      - paragraph [ref=e2444]: (1) ログイン後［Administration］にアクセスし、［インデックスツリー管理］＞［ツリー編集］でインデックスを選択して、［削除］をクリックします。
      - paragraph [ref=e2445]
      - paragraph [ref=e2446]: インデックスを削除すると、子インデックスおよびアイテムも削除されます。
      - paragraph [ref=e2447]: 確認メッセージが表示されます。
      - paragraph [ref=e2448]: (2) ［すべて削除］をクリックします。
      - paragraph [ref=e2449]
      - paragraph [ref=e2450]: エラーがない場合は「正常にインデックスを削除しました。(Index is deleted successfully.)」というポップアップが表示され、子インデックスおよびアイテムが、すべて削除されます。
      - paragraph [ref=e2451]: なお、削除中は、ツリー編集画面上の各ボタンが非活性となります。
      - paragraph [ref=e2452]: ※インデックスにDOIが付与されているアイテムが紐づいている場合、インデックスの削除はできません。
      - paragraph [ref=e2453]
      - heading "6．インデックスの移動" [level=2] [ref=e2454]
      - paragraph [ref=e2455]: ログイン後［Administration］にアクセスし、［インデックスツリー管理］＞［ツリー編集］で移動したいインデックスを希望の位置にドラッグして、ドロップします。
      - paragraph [ref=e2456]: インデックスが移動します。
      - paragraph [ref=e2457]: インデックスを移動すると、子インデックスも一緒に移動します。
