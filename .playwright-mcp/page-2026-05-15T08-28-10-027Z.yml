      - paragraph [ref=e2283]: ※ 投稿内容は広く共有される可能性がありますので、パスワード等機密情報は投稿しないようご注意ください。
      - heading "1．インデックスについて" [level=2] [ref=e2284]
      - paragraph [ref=e2285]: インデックスは、JAIRO Cloudに登録したアイテムをまとめる単位（カテゴリ）です。
      - paragraph [ref=e2286]: JAIRO Cloudに登録したアイテムは必ず1つ以上のインデックスに所属します。
      - paragraph [ref=e2287]: インデックスは複数の子インデックスとアイテムを持つことができます。
      - paragraph [ref=e2288]: インデックスツリーの表示設定画面は、［Administration］にアクセスし、［設定］をクリックして ［検索設定］ をクリックすると表示されます。
      - paragraph [ref=e2289]: インデックスツリーの編集画面は、［Administration］にアクセスし、［インデックスツリー管理］をクリックして［ツリー編集］をクリックすると表示されます。
      - paragraph [ref=e2290]: 以下の手順で［トップ］画面の表示設定ができます。
      - paragraph [ref=e2291]: (1) ログイン後、［Administration］にアクセスし、［設定］をクリックして［検索設定］をクリックします。
      - paragraph [ref=e2292]
      - paragraph [ref=e2293]: (2) インデックスツリー／ファセット 表示設定で［トップ］画面に表示する項目を選択します。
      - paragraph [ref=e2294]
      - paragraph [ref=e2295]: ［インデックスツリー］にチェックを入れると［トップ］画面にインデックスツリーが表示されます。
      - paragraph [ref=e2296]
      - paragraph [ref=e2297]: ［ファセット］にチェックを入れると［トップ］画面に以下が表示されます。
      - paragraph [ref=e2298]
      - heading "2．インデックスの表示" [level=2] [ref=e2299]
