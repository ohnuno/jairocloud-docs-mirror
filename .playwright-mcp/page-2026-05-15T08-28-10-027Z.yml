      - heading "3．インデックスの登録" [level=2] [ref=e2323]
      - paragraph [ref=e2324]: (1) ログイン後、［Administration］にアクセスし、［インデックスツリー管理］をクリックして［ツリー編集］をクリックします。
      - paragraph [ref=e2325]: (2) インデックスを新規作成します。 ［+追加］をクリックするとRoot Index直下の最下行に新規インデックスが作成されます。
      - paragraph [ref=e2326]: 任意のインデックスをクリックして選択し、［+追加］をクリックすると任意のインデックス直下の最下行にインデックスが新規作成されます。
      - paragraph [ref=e2327]
      - paragraph [ref=e2328]: (3) 追加したインデックスをドラッグアンドドロップして、位置を調整します。
      - paragraph [ref=e2329]
      - paragraph [ref=e2330]: (4) 追加したインデックスを選択して、［インデックス編集］に情報を入力します。
