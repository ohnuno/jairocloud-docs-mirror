        - text: 【補足】
        - text: 設定によってDOIを三つの方法で付与することができます。
      - paragraph [ref=e4610]:
        - strong [ref=e4611]: 自動連番
      - paragraph [ref=e4612]: ［Identifier Grant］画面に管理画面の［Identifier］で設定しているプレフィックスと自動採番されたサフィックスが表示されます。
      - paragraph [ref=e4613]
      - paragraph [ref=e4614]:
