        - rowgroup [ref=e5258]:
          - row "ファイルダウンロード logReport_FileDownload_YYYY-MM.tsv ファイルごとのダウンロード回数を、次の分類順に出力します。 ・ファイルダウンロード回数 ・オープンアクセスのファイルダウンロード回数 各分類の出力項目は以下の通りです。 ・ファイル名 ・登録インデックス名 ・ファイルダウンロード回数 ・未ログインユーザー ・ログインユーザー ・サイトライセンス認可ユーザー ・管理者 ・アイテム登録者 出力レイアウト ※ 1つのアイテムに複数のファイルが存在する場合、ファイルごとにダウンロード回数が表示されます。 ※ ファイルの差し替えを行った場合、差し替え前のファイル、差し替え後のファイルのそれぞれについて、ダウンロード回数が表示されます（2021/6/29 アップデート時点での動作）。ファイルの差し替えについては「アイテム個別登録」 4．1．アイテムの更新、または「アイテム一括登録」 3．1．アイテムの一括更新を参照してください。" [ref=e5259]:
            - cell "ファイルダウンロード" [ref=e5260]
