          - row "インデックスリンク ［トップ］画面のインデックスリンクに、追加したインデックスを表示するかどうかを設定します。 また、インデックスリンクに表示する名称も設定します。英語のインデックス名は、必ず入力してください。未入力の場合、インデックス名が表示されます。 インデックスリンクを表示するには、［Administration］にアクセスし、［設定］をクリックして［インデックスリンク表示］をクリックしてから、［Enable］をクリックします。" [ref=e2366]:
