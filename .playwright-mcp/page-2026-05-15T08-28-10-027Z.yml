          - row "ハーベスト公開 「公開する」にチェックを入れている場合、所属しているアイテムにOAI-PMH要求が行われた際に、メタデータをアイテムタイプのマッピング従って出力します。 ※出力には、事前にリポジトリがOAI-PMHを出力するよう設定しておく必要があります（［Administration］>［OAI-PMH］>［Identify］の「Output Set」にチェックが入っている）。 ※アイテムタイプのマッピングは［8．アイテムタイプのマッピングの設定］を参照ください。" [ref=e2386]:
