      - paragraph [ref=e2146]: ※ 投稿内容は広く共有される可能性がありますので、パスワード等機密情報は投稿しないようご注意ください。
      - heading "1．ハーベストについて" [level=2] [ref=e2147]
      - paragraph [ref=e2148]: OAI-PMHを利用し、他のシステム（他機関リポジトリ等）からハーベストを行うことができます。
      - paragraph [ref=e2149]: ハーベストに対応しているスキーマは「JPCOAR」、「DDI」、「Dublin Core」です。
      - paragraph [ref=e2150]: ハーベストの設定画面は、［Administration］にアクセスし、［OAI-PMH］をクリックして［ハーベスト］をクリックすると表示されます。
      - paragraph [ref=e2151]: ※JAIRO Cloud同士のハーベストがシステム構成により失敗することが報告されています。その場合は、Base Urlの「.」を「-」に変換し、「-nginx」をつけてください。（例：「https://xxxx.repo.nii.ac.jp/oai」→「https://xxxx-repo-nii-ac-jp-nginx/oai」
      - heading "2．ハーベストを実行する" [level=2] [ref=e2152]
      - paragraph [ref=e2153]: ハーベストを、自動または手動で実行することができます。
      - heading "2．1．ハーベストを自動で実行する" [level=3] [ref=e2154]
      - paragraph [ref=e2155]:
        - link "「ハーベストのプランを編集する」の(4)" [ref=e2156] [cursor=pointer]:
          - /url: "#m4-4"
        - text: で設定された実行間隔で、ハーベストを自動で実行します。
      - heading "2．2．ハーベストを手動で実行する" [level=3] [ref=e2157]
      - paragraph [ref=e2158]: 以下の手順で、ハーベストを手動で実行することもできます。
      - paragraph [ref=e2159]: (1) ハーベストの設定画面で、［一覧］タブをクリックします。
      - paragraph [ref=e2160]: 登録されているハーベストのプランの一覧が表示されます。
      - paragraph [ref=e2161]
      - paragraph [ref=e2162]: (2) 行頭に表示されている目のアイコンをクリックします。
      - paragraph [ref=e2163]
      - paragraph [ref=e2164]: ハーベストのプランの詳細が表示されます。
      - paragraph [ref=e2165]
      - paragraph [ref=e2166]: (3) ［Run］ボタンをクリックします。
      - paragraph [ref=e2167]: 画面を再読み込みします。
      - paragraph [ref=e2168]
      - paragraph [ref=e2169]:
        - text: ハーベストのプランに基づきハーベストを実施します。
        - text: ハーベストのプランの編集については「
        - link "4．ハーベストのプランを編集する" [ref=e2170] [cursor=pointer]:
          - /url: "#m4"
        - text: 」を参照してください。
      - paragraph [ref=e2171]: 実行結果が［Running logs］に表示されます。
      - list [ref=e2172]:
        - listitem [ref=e2173]: ハーベスト元リポジトリに存在しないアイテムは、新規登録されます。
        - listitem [ref=e2174]: ハーベスト元リポジトリに存在するアイテムは、アイテムのメタデータ・バージョン及び所属インデックスが更新されます。
        - listitem [ref=e2175]: ハーベスト元リポジトリに存在するアイテムがハーベスト先リポジトリで削除された場合、該当アイテムの全バージョンが論理削除されます。
      - paragraph [ref=e2176]
      - paragraph [ref=e2177]: ※ ハーベストの実行時にエラーが発生する場合、エラー内容が［Error Message, Url］に表示されます。
      - paragraph [ref=e2178]
      - paragraph [ref=e2179]: (4) ハーベストを実行している間に、ハーベストを中断する場合、［Pause］をクリックします。
      - paragraph [ref=e2180]: 実行中の登録処理が完了次第、ハーベストの実行が中断されます。
      - paragraph [ref=e2181]
      - paragraph [ref=e2182]: (5) 中断したハーベストを再開する場合、［Resume］をクリックします。
      - paragraph [ref=e2183]: 該当ハーベストが再開されます。
      - paragraph [ref=e2184]
      - paragraph [ref=e2185]: (6) 中断したハーベストをキャンセルする場合、［Clear］をクリックします。
      - paragraph [ref=e2186]: 該当ハーベストがキャンセルされます。
      - paragraph [ref=e2187]
      - heading "3．ハーベストのプランを作成する" [level=2] [ref=e2188]
      - paragraph [ref=e2189]: ハーベストを実行するためのプランを作成することができます。
      - paragraph [ref=e2190]: (1) ハーベストの設定画面で、［作成］タブをクリックします。
      - paragraph [ref=e2191]: プランを作成する画面が表示されます。
      - paragraph [ref=e2192]: (2) 情報を入力します。
      - paragraph [ref=e2193]
      - paragraph [ref=e2194]: ［作成］の項目
      - table [ref=e2195]:
        - rowgroup [ref=e2196]:
          - row "項目 説明" [ref=e2197]:
            - columnheader "項目" [ref=e2198]
            - columnheader "説明" [ref=e2199]
        - rowgroup [ref=e2200]:
          - row "Repository Name ハーベスト対象のリポジトリ名を入力します。" [ref=e2201]:
            - cell "Repository Name" [ref=e2202]
            - cell "ハーベスト対象のリポジトリ名を入力します。" [ref=e2203]
          - row "Base Url ハーベスト対象のベースURLを設定します。" [ref=e2204]:
            - cell "Base Url" [ref=e2205]
            - cell "ハーベスト対象のベースURLを設定します。" [ref=e2206]
          - row "From Date ハーベスト開始日を設定します。" [ref=e2207]:
            - cell "From Date" [ref=e2208]
            - cell "ハーベスト開始日を設定します。" [ref=e2209]
          - row "Until Date ハーベスト終了日を設定します。" [ref=e2210]:
            - cell "Until Date" [ref=e2211]
            - cell "ハーベスト終了日を設定します。" [ref=e2212]
          - row "Set Spec ハーベストのset条件を設定します。※ WEKO3の場合は、インデックスを作成すると、Setの設定が追加されます。" [ref=e2213]:
            - cell "Set Spec" [ref=e2214]
            - cell "ハーベストのset条件を設定します。※ WEKO3の場合は、インデックスを作成すると、Setの設定が追加されます。" [ref=e2215]
          - row "Metadata Prefix メタデータのスキーマのPrefixを入力します。「jpcoar」（JPCOARスキーマ ver1.0.1）、「jpcoar_1.0」（JPCOARスキーマ ver1.0.2）、「oai_dc」（Dublin Core）、「ddi」（DDI）のいずれかを入力する必要があります。" [ref=e2216]:
            - cell "Metadata Prefix" [ref=e2217]
            - cell "メタデータのスキーマのPrefixを入力します。「jpcoar」（JPCOARスキーマ ver1.0.1）、「jpcoar_1.0」（JPCOARスキーマ ver1.0.2）、「oai_dc」（Dublin Core）、「ddi」（DDI）のいずれかを入力する必要があります。" [ref=e2218]
          - row "Target Index 登録先インデックスを設定します。" [ref=e2219]:
            - cell "Target Index" [ref=e2220]
            - cell "登録先インデックスを設定します。" [ref=e2221]
          - row "Update Style 更新方法を［Bulk］/［Difference］から選択します。一括更新（Bulk）：ハーベストのプランで指定した範囲のアイテム全件をハーベスト対象とします。差分更新（Difference）：前回ハーベストした際のdatestampよりも未来日のものだけをハーベスト対象とします。" [ref=e2222]:
            - cell "Update Style" [ref=e2223]
            - cell "更新方法を［Bulk］/［Difference］から選択します。一括更新（Bulk）：ハーベストのプランで指定した範囲のアイテム全件をハーベスト対象とします。差分更新（Difference）：前回ハーベストした際のdatestampよりも未来日のものだけをハーベスト対象とします。" [ref=e2224]
          - row "Auto Distribution 子インデックスへの自動振り分けを指定を［Run］/［Do not run］から選択します。Run：登録先インデックス直下にハーベスト対象リポジトリのインデックスツリーを作成し、ハーベストで取得したアイテムがそれぞれのインデックスに配置されます。Do not run：登録先インデックス直下にはインデックスツリーが作成されず、ハーベストで取得したアイテムが登録先インデックス直下に全て配置されます。" [ref=e2225]:
            - cell "Auto Distribution" [ref=e2226]
            - cell "子インデックスへの自動振り分けを指定を［Run］/［Do not run］から選択します。Run：登録先インデックス直下にハーベスト対象リポジトリのインデックスツリーを作成し、ハーベストで取得したアイテムがそれぞれのインデックスに配置されます。Do not run：登録先インデックス直下にはインデックスツリーが作成されず、ハーベストで取得したアイテムが登録先インデックス直下に全て配置されます。" [ref=e2227]
      - paragraph [ref=e2228]: (3) ［保存］ボタンをクリックします。
      - paragraph [ref=e2229]: 入力した情報が保存されます。
      - heading "4．ハーベストのプランを編集する" [level=2] [ref=e2230]
      - paragraph [ref=e2231]: ハーベストのプランを編集することができます。
      - paragraph [ref=e2232]: (1) ハーベストの設定画面で、［一覧］タブをクリックし、行頭に表示されている鉛筆のアイコンをクリックします。
      - paragraph [ref=e2233]
      - paragraph [ref=e2234]: (2) プランの編集画面が表示されるので、情報を入力します。
      - paragraph [ref=e2235]:
        - text: 入力項目については「
        - link "3．ハーベストのプランを作成する" [ref=e2236] [cursor=pointer]:
          - /url: "#m3"
        - text: 」を参照してください。
      - paragraph [ref=e2237]
      - paragraph [ref=e2238]: (3) ［保存］ボタンをクリックします。
      - paragraph [ref=e2239]: 入力した情報が保存されます。
      - paragraph [ref=e2240]
      - paragraph [ref=e2241]: (4) ［Schedule］で、ハーベストを実行する間隔を設定します。
      - paragraph [ref=e2242]: ハーベストを自動で実行する場合は、「オン」に設定してください。
      - paragraph [ref=e2243]
      - paragraph [ref=e2244]: (5) ［保存］ボタンをクリックします。
      - paragraph [ref=e2245]: 入力した情報が保存されます。
      - paragraph [ref=e2246]
      - heading "5．ハーベストのプランを削除する" [level=2] [ref=e2247]
      - paragraph [ref=e2248]: ハーベストのプランを削除することができます。
      - heading "5．1．ハーベストのプランを1件ずつ削除する" [level=3] [ref=e2249]
      - paragraph [ref=e2250]: (1) ［一覧］タブで、行頭に表示されているゴミ箱のアイコンをクリックします。
      - paragraph [ref=e2251]: プランが削除されます。
      - paragraph [ref=e2252]
      - heading "5．2．ハーベストのプランをまとめて削除する" [level=3] [ref=e2253]
      - paragraph [ref=e2254]: (1) ［一覧］タブで、削除したいプランの行頭のチェックボックスをチェックします。
      - paragraph [ref=e2255]
      - paragraph [ref=e2256]: (2) ［選択］タブをクリックして、［削除］を選択します。
      - paragraph [ref=e2257]
      - paragraph [ref=e2258]: 削除確認用のダイアログが表示されます。
      - paragraph [ref=e2259]
      - paragraph [ref=e2260]: (3) ［OK］をクリックします。
      - paragraph [ref=e2261]: プランが削除されます。
