      - heading "6．アイテムタイプをエクスポートする" [level=2] [ref=e5159]
      - paragraph [ref=e5160]: アイテムタイプをファイルとしてエクスポートすることができます。エクスポートしたアイテムタイプはインポートにより取り込むことができます。
      - paragraph [ref=e5161]: (1) ［標準アイテムタイプ］を選択します。
      - paragraph [ref=e5162]: (2) ［エクスポート］をクリックします。
      - paragraph [ref=e5163]: (3) アイテムタイプの定義を含んだZIPファイルがダウンロードされます。
      - paragraph [ref=e5164]
      - heading "7．アイテムタイプをインポートする" [level=2] [ref=e5165]
      - paragraph [ref=e5166]: エクスポートされたアイテムタイプをインポートできます。
      - paragraph [ref=e5167]: (1) ［標準アイテムタイプ］を選択します。
      - paragraph [ref=e5168]: (2) ［インポート］をクリックします。
      - paragraph [ref=e5169]
      - paragraph [ref=e5170]: (3) ［ファイルを開く］をクリックし、エクスポートされたアイテムタイプを読み込みます。
      - paragraph [ref=e5171]: (4) ［Item Type］にインポートするアイテムタイプの名称を入力します。
      - paragraph [ref=e5172]: (5) ［Execute Import］をクリックすると、入力した名称でアイテムタイプが取り込まれます。
      - paragraph [ref=e5173]
      - paragraph [ref=e5174]: ※本機能を利用する場合は、事前にアイテムタイプと同じプロパティが定義されている必要があります。
      - heading "8．アイテムタイプのマッピングの設定" [level=2] [ref=e5175]
      - heading "8．1．アイテムタイプをマッピングする" [level=3] [ref=e5176]
      - paragraph [ref=e5177]: アイテムタイプをスキーマにマッピングする方法を説明します。
      - paragraph [ref=e5178]: マッピングの編集画面は、［アイテムタイプ管理］をクリックして［マッピング］をクリックすると表示されます。
      - paragraph [ref=e5179]: 本画面で設定したマッピングの情報は、アイテム詳細画面にあるOAI-PMH出力をする際に、本画面の情報を参照してOAI-PMH出力を行います。
      - paragraph [ref=e5180]: (1) ［アイテムタイプリスト］からアイテムタイプ、［スキーマリスト］からスキーマを選択します。
      - paragraph [ref=e5181]: ［アイテムタイプ(親)］と［スキーマ(親)］に値が表示されます。
      - paragraph [ref=e5182]
      - paragraph [ref=e5183]: (2) ［アイテムタイプ(親)］にマッピングする［スキーマ(親)］の属性を変更する場合は、プルダウンリストから選択します。
      - paragraph [ref=e5184]: ［アイテムタイプ(親)］にマッピングする［スキーマ(親)］の属性を変更しないで(子)の属性を変更したい場合は、そのまま［スキーマ(親)］の左のラジオボタンをチェックします。
      - paragraph [ref=e5185]
      - paragraph [ref=e5186]: (3) (子)の属性をプルダウンリストから選択します。
      - paragraph [ref=e5187]
      - paragraph [ref=e5188]: (4) 属性を追加する場合は、［+ 追加］をクリックします。
      - paragraph [ref=e5189]: 項目が追加されます。
      - paragraph [ref=e5190]
      - paragraph [ref=e5191]: (5) 編集した内容を保存する場合、［保存］をクリックします。
      - paragraph [ref=e5192]: アイテムタイプがスキーマにマッピングされます。
      - paragraph [ref=e5193]:
        - text: ※WEKO3では、同一の［スキーマ(親)］を複数の［アイテムタイプ(親)］にマッピングできるため、OAI-PMHの出力でエラーが発生しないよう、［アイテムタイプ(親)］のマッピング設定をチェックしています。
        - text: 同一の［スキーマ(親)］を複数の［アイテムタイプ(親)］にマッピングする場合、それぞれの［アイテムタイプ(親)］のマッピング設定が異なった状態で「保存」をクリックすると、エラーが表示されます。
      - paragraph [ref=e5194]: (6) 複数の(子)プロパティを1つの子要素にマッピングさせる場合は［Join］をクリックします。
      - paragraph [ref=e5195]: 入力欄に「,」(半角カンマ)を入れることで、複数の(子)プロパティを1つの子要素にマッピングさせることができます。
      - paragraph [ref=e5196]
      - paragraph [ref=e5197]: ［Add static value］をクリックすると、指定した値を子要素に出力させることができます。
      - paragraph [ref=e5198]
      - heading "8．2．システムが付与したアイテムタイプ（親）をマッピングする" [level=3] [ref=e5199]
      - paragraph [ref=e5200]: ［システムが付与したアイテムタイプ（親）］をスキーマにマッピングする方法を説明します。
      - paragraph [ref=e5201]: ［システムが付与したアイテムタイプ（親）］では、JAIRO Cloudのシステム操作を介して作成されるメタデータの［永続識別子］や［ファイル情報］をマッピングすることができます。
      - paragraph [ref=e5202]: マッピングの編集画面は、［アイテムタイプ管理］をクリックして［マッピング］をクリックすると表示されます。
      - paragraph [ref=e5203]: (1) ［アイテムタイプリスト］からアイテムタイプ、［スキーマリスト］からスキーマを選択します。
      - paragraph [ref=e5204]: ［アイテムタイプ(親)］と［スキーマ(親)］に値が表示されます。
      - paragraph [ref=e5205]
      - paragraph [ref=e5206]: (2) ［システムが付与したアイテムタイプ (親)］をクリックします。
      - paragraph [ref=e5207]: ［システムが付与したアイテムタイプ (親)］のマッピングエリアが表示されます。
      - paragraph [ref=e5208]
      - paragraph [ref=e5209]: (3) ［システムが付与したアイテムタイプ(親)］にマッピングする［スキーマ(親)］の属性を変更する場合は、プルダウンリストから選択します。
      - paragraph [ref=e5210]: ［システムが付与したアイテムタイプアイテムタイプ(親)］にマッピングする［スキーマ(親)］の属性を変更しないで(子)の属性を変更したい場合は、そのまま［スキーマ(親)］の左のラジオボタンをチェックします。
      - paragraph [ref=e5211]: 画面下部に（子） の属性が表示されます。
      - paragraph [ref=e5212]
      - paragraph [ref=e5213]: (4) 属性を追加する場合は、［+ 追加］をクリックします。
      - paragraph [ref=e5214]: 項目が追加されます。
      - paragraph [ref=e5215]: (5) 編集した内容を保存する場合は、［保存］をクリックします。
      - paragraph [ref=e5216]: アイテムタイプがスキーマにマッピングされます。
      - paragraph [ref=e5217]: 【注意事項】
      - paragraph [ref=e5218]: 異なるプロパティに対して同じスキーマをマッピングさせる場合は、Schema (子)含めて全て同じようにマッピングさせる必要があります。同じマッピングではない場合は、保存時に「Duplicate mapping as below」とメッセージが表示され、マッピング情報を保存できません。
      - separator [ref=e5219]
