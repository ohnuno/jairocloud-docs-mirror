      - heading "シークレットURL機能" [level=4] [ref=e1093]
      - paragraph [ref=e1094]:
        - text: シークレットURL機能とは、特定のコンテンツファイルに対して、シークレットURLを発行し、そのURLを知っている人が誰でも対象のコンテンツファイルをダウンロードできるようにする機能です。
        - text: 管理者画面でシークレットURL機能を有効化することで、シークレットURLを発行することができます。
      - paragraph [ref=e1095]:
        - text: 本機能は、
        - strong [ref=e1096]: 公開コンテンツ、ならびにサイトライセンス機能を利用してサイトライセンスユーザーに対してアクセス可能になっているコンテンツに対して、新たにアクセス権限を付与し、シークレットURLを通じたアクセスに制限する機能ではありません
        - text: 。
      - paragraph [ref=e1097]: 以下の条件を満たした場合、Information画面のファイルエリアに［シークレットURL］ボタンが追加されます。
      - list [ref=e1098]:
        - listitem [ref=e1099]: 管理画面の制限公開画面にて、シークレットURLの表示を有効化している。
        - listitem [ref=e1100]: アイテム投稿者・アイテムの代理投稿者・リポジトリ管理者・システム管理者がログインしている。
        - listitem [ref=e1101]: 当該ファイルを「公開しない」と設定している。または、ファイルが「オープンアクセス日を指定する」と設定し、指定日が未来日である。
        - listitem [ref=e1102]: 当該アイテムを登録先インデックスが「公開」である。
        - listitem [ref=e1103]: 当該アイテムのPublish StatusがPublishである。
