        - listitem [ref=e3910]: ［プレビュー］を表示できるファイル形式はmd、json、xml、csv、pdf、png、jpg、gif、zip、jpynb、mp3、mp4、webm、ogg、wav、 doc、docx、xls、xlsx、ppt、pptxです。
        - listitem [ref=e3911]: プレビューの表示でエラーが発生する場合、エラー内容がプレビュー表示エリアに表示されます。
        - listitem [ref=e3912]: プレビュー表示でコンテンツファイルのアクセス権が無い場合は、アクセス権が無い旨をファイル情報エリアに表示し、プレビュー表示は行いません。
        - listitem [ref=e3913]: コンテンツファイルの公開日が未来日の場合は、ダウンロード可能な年月日をファイル情報エリアに表示し、プレビュー表示は行いません。
        - listitem [ref=e3914]:
          - text: 複数のファイルがある場合、アイテム詳細画面での表示順序は、[Item Registration]画面で表示されるファイル情報の入力エリア順となります。
          - text: 入力エリアの順序をドラッグ&ドロップで変更することで、アイテム詳細画面でのファイルの表示順序を変更することができます。
