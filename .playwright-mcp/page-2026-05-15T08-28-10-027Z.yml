      - heading "1．2．メールで送信する" [level=3] [ref=e5307]
      - paragraph [ref=e5308]:
        - text: (1) 「
        - link "1．1．ダウンロードする" [ref=e5309] [cursor=pointer]:
          - /url: "#m1.1"
        - text: 」(1)(2)と同様に［タイプ］、［年］、および［月］を選びます。
      - paragraph [ref=e5310]: (2) ［メール送信］で、メールアドレスを入力して［保存］をクリックします。メッセージ「Successfully saved email addresses.」が表示されます。
      - paragraph [ref=e5311]:
        - text: メールアドレスを追加する場合、［+メールアドレス］をクリックします。
        - text: メールアドレスの入力欄が追加されます。
      - paragraph [ref=e5312]:
        - text: メールアドレスを削除する場合、［X］をクリックします。
        - text: メールアドレスが削除されます。
      - paragraph [ref=e5313]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat02.png
      - paragraph [ref=e5314]: (3) ［送信］をクリックします。
      - paragraph [ref=e5315]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat23.png
      - paragraph [ref=e5316]: メール送信確認ダイアログが表示されます。
      - paragraph [ref=e5317]: ［Confirm］をクリックすると登録したメールアドレスへ定型レポートが送信されます。
      - paragraph [ref=e5318]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat06.png
      - paragraph [ref=e5319]: 登録したメールアドレスへ定型レポートが送信されます。メッセージ「レポートを送信しました」が表示されます。
      - paragraph [ref=e5320]: (4) 定期的にメールを受信する場合、［メールスケジュールの報告］で［送信間隔］の［周期］を選択して、ラジオボタンの［オン］を選択します。
      - paragraph [ref=e5321]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat17.png
      - paragraph [ref=e5322]: (5) ［保存］をクリックします。
      - paragraph [ref=e5323]: メールスケジュールが設定されます。
      - paragraph [ref=e5324]: 設定された送信周期に基づき定型レポートメールが送信されます。
      - paragraph [ref=e5325]: 【参考】定型レポートひな形
      - paragraph [ref=e5326]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat18.png
      - paragraph [ref=e5327]: ［※］にはメール本文の言語に応じてリポジトリ名が入ります。
      - heading "2．カスタムレポートの出力" [level=2] [ref=e5328]
      - paragraph [ref=e5329]: (1) ［統計］＞［運用レポート］をクリックします。
      - paragraph [ref=e5330]: (2) ［Custom Report］の項目を入力します。
      - paragraph [ref=e5331]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat16.png
      - table [ref=e5332]:
        - rowgroup [ref=e5333]:
          - row "項目 説明" [ref=e5334]:
            - columnheader "項目" [ref=e5335]
            - columnheader "説明" [ref=e5336]
        - rowgroup [ref=e5337]:
          - row "Start Date ログを集計する最初の日です。 カレンダーから選択または入力します。フォーマットは「yyyy/mm/dd」です。" [ref=e5338]:
            - cell "Start Date" [ref=e5339]
            - cell "ログを集計する最初の日です。 カレンダーから選択または入力します。フォーマットは「yyyy/mm/dd」です。" [ref=e5340]
          - row "End Date ログを集計する最終の日です。 カレンダーから選択または入力します。フォーマットは「yyyy/mm/dd」です。" [ref=e5341]:
            - cell "End Date" [ref=e5342]
            - cell "ログを集計する最終の日です。 カレンダーから選択または入力します。フォーマットは「yyyy/mm/dd」です。" [ref=e5343]
          - row "Target Report レポートの種類です。必ず指定します。 ・［アイテム登録数］：期間中に登録されたアイテムの数です。 ・［閲覧回数］：期間中に閲覧されたアイテムの数です。 ・［ダウンロード回数］：期間中にダウンロードされたアイテムの数です。" [ref=e5344]:
            - cell "Target Report" [ref=e5345]
            - cell "レポートの種類です。必ず指定します。 ・［アイテム登録数］：期間中に登録されたアイテムの数です。 ・［閲覧回数］：期間中に閲覧されたアイテムの数です。 ・［ダウンロード回数］：期間中にダウンロードされたアイテムの数です。" [ref=e5346]
          - row "Unit 集計単位です。必ず指定します。 デフォルトの状態は非活性です。［Target Report］を選択した後、活性になります。 以下の単位を選択できます。 ・Day ・Week ・Year ・Item ・Host" [ref=e5347]:
            - cell "Unit" [ref=e5348]
            - cell "集計単位です。必ず指定します。 デフォルトの状態は非活性です。［Target Report］を選択した後、活性になります。 以下の単位を選択できます。 ・Day ・Week ・Year ・Item ・Host" [ref=e5349]
      - paragraph [ref=e5350]: (3) ［Display］をクリックします。
      - paragraph [ref=e5351]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat04.png
      - paragraph [ref=e5352]: ［Result］に集計結果が表示されます。
      - paragraph [ref=e5353]: ※ ファイルの差し替えを行った場合、［バージョン管理］の設定によって、カスタムレポートのファイルダウンロード数の集計が異なります（2021/6/29 アップデート時点での動作）。
      - paragraph [ref=e5354]:
        - text: ファイルの差し替えについては
        - link "「アイテム個別登録」 4．1．アイテムの更新" [ref=e5355] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/item-registration/#m4.1
        - text: 、または
        - link "「アイテム一括登録」 3．1．アイテムの一括更新" [ref=e5356] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/item-import/#m3.1
        - text: を参照してください。
      - list [ref=e5357]:
        - listitem [ref=e5358]:
          - text: ファイルを差し替えるアイテムを、［バージョンを維持する］または［Keep］を設定して更新した場合
          - list [ref=e5359]:
            - listitem [ref=e5360]: カスタムレポートのファイルダウンロード回数は引き継がれます。
        - listitem [ref=e5361]:
          - text: ファイルを差し替えるアイテムを、［バージョンを更新する］または［Update］を設定して更新した場合
          - list [ref=e5362]:
            - listitem [ref=e5363]: カスタムレポートのファイルダウンロード回数は、バージョンごとに集計されます。
      - heading "3．フィードバックメールの設定" [level=2] [ref=e5364]
      - paragraph [ref=e5365]: (1) ［統計］＞［フィードバックメール］をクリックします。
      - paragraph [ref=e5366]: フィードバックメールの送信を設定する画面が表示されます。
      - paragraph [ref=e5367]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat08.png
      - paragraph [ref=e5368]: (2) ［送信］または［無効］を選択します。
      - paragraph [ref=e5369]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat14.png
      - paragraph [ref=e5370]: (3) ［送信除外対象者］を設定します。
      - paragraph [ref=e5371]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat07.png
      - paragraph [ref=e5372]: ［著者DBから入力］の画面から選択または手入力することができます。
      - paragraph [ref=e5373]: メールアドレスを検索し、［入力］をクリックして［閉じる］をクリックします。
      - paragraph [ref=e5374]: 手入力の場合は、入力後にEnterキーを押すことでメールアドレスを登録できます。
      - paragraph [ref=e5375]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat11.png
      - paragraph [ref=e5376]: (4) ［保存］をクリックします。
      - paragraph [ref=e5377]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat20.png
      - paragraph [ref=e5378]: 設定が保存されます。
      - paragraph [ref=e5379]: 設定された送信周期に基づきフィードバックメールが送信されます。
      - paragraph [ref=e5380]: また、フィードバックメールの送信履歴が［送信履歴］の表に表示されます。
      - paragraph [ref=e5381]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat24.png
      - separator [ref=e5382]
      - heading "ユーザーアカウント管理 | オープンアクセスリポジトリ推進協会（JPCOAR）" [level=1] [ref=e5383]
      - paragraph [ref=e5384]:
        - emphasis [ref=e5385]:
          - text: "Source:"
          - link "https://jpcoar.org/support/jairo-cloud/manual/user-account/" [ref=e5386] [cursor=pointer]:
            - /url: https://jpcoar.org/support/jairo-cloud/manual/user-account/
      - paragraph [ref=e5387]:
        - text: JAIRO Cloud環境提供時に、連絡担当者の方へ利用申請のメールアドレスをfrom、toとして「ユーザー登録のご案内」メールが届きます。このメールからユーザーアカウントの登録を行ってください。（機関で最初に登録するユーザーアカウントを「機関管理者」と呼びます。）
        - text: 登録したユーザーアカウントを使うことで、JAIRO Cloudにログインし、論文などのコンテンツが登録できるようになります。
      - heading "目次" [level=2] [ref=e5388]
      - paragraph [ref=e5389]:
        - link "１．ユーザーアカウントの登録" [ref=e5390] [cursor=pointer]:
          - /url: "#m1"
        - link "２．ユーザーアカウント情報のダウンロード" [ref=e5391] [cursor=pointer]:
          - /url: "#m2"
        - link "３．ユーザーアカウントの追加" [ref=e5392] [cursor=pointer]:
          - /url: "#m3"
        - link "４．ユーザーアカウント情報の検索" [ref=e5393] [cursor=pointer]:
          - /url: "#m4"
        - link "５．ユーザーアカウントの削除" [ref=e5394] [cursor=pointer]:
          - /url: "#m5"
      - paragraph [ref=e5395]: 問い合わせメール作成
      - paragraph [ref=e5396]: 以下のリンクをクリックすると、お使いのメールソフトを起動して問い合わせ用のフォーマットが入った状態でメールを作成できます。
      - paragraph [ref=e5397]:
        - text: ●
        - link "問い合わせメール作成" [ref=e5398] [cursor=pointer]:
          - /url: mailto:jpcoar-jc@jpcoar.org?subject=%E3%80%90%E8%B3%AA%E5%95%8For%E9%9A%9C%E5%AE%B3or%E8%A6%81%E6%9C%9B%E3%80%91%E3%82%A2%E3%82%A4%E3%83%86%E3%83%A0%E8%A9%B3%E7%B4%B0%E7%94%BB%E9%9D%A2%E3%81%AE%E3%82%A8%E3%83%A9%E3%83%BC%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6%EF%BC%88JPCOAR%E5%A4%A7%E5%AD%A6%EF%BC%89&body=%E7%99%BA%E7%94%9F%E6%97%A5%E6%99%82%2A%EF%BC%9A%28%E3%82%A8%E3%83%A9%E3%83%BC%E3%81%AB%E9%81%AD%E9%81%87%E3%81%97%E3%81%9F%E6%97%A5%E6%99%82%E3%80%81%E4%BD%9C%E6%A5%AD%E5%AE%9F%E6%96%BD%E6%97%A5%E6%99%82%E3%80%81%E5%95%8F%E9%A1%8C%E7%99%BA%E8%A6%8B%E6%97%A5%E6%99%82%E7%AD%89%29%0A%0A%E8%87%AA%E6%A9%9F%E9%96%A2%E3%83%AA%E3%83%9D%E3%82%B8%E3%83%88%E3%83%AAURL%2A%EF%BC%9A%28%E6%A9%9F%E9%96%A2%E3%83%AA%E3%83%9D%E3%82%B8%E3%83%88%E3%83%AA%E3%81%AE%E3%83%88%E3%83%83%E3%83%97%E3%83%9A%E3%83%BC%E3%82%B8URL%29%0A%0A%E8%B3%AA%E5%95%8F%E5%86%85%E5%AE%B9%2A%EF%BC%9A%0A%0A%E5%86%8D%E7%8F%BE%E6%89%8B%E9%A0%86%2A%EF%BC%9A%28%E3%81%A9%E3%81%AE%E7%94%BB%E9%9D%A2%E3%82%84%E3%83%87%E3%83%BC%E3%82%BF%E3%81%A7%E3%80%81%E4%BD%95%E3%82%92%E3%80%81%E3%81%A9%E3%81%AE%E3%82%88%E3%81%86%E3%81%AB%E6%93%8D%E4%BD%9C%E3%81%99%E3%82%8B%E3%81%A8%E7%99%BA%E7%94%9F%E3%81%99%E3%82%8B%E3%81%AE%E3%81%8B%E3%80%82%E3%82%A2%E3%82%A4%E3%83%86%E3%83%A0%E9%96%A2%E9%80%A3%E3%81%AE%E5%A0%B4%E5%90%88%E3%81%AF%E3%82%A2%E3%82%A4%E3%83%86%E3%83%A0URL%29%0A%0A%E7%A2%BA%E8%AA%8D%E6%B8%88%E3%81%BF%E4%BA%8B%E9%A0%85%EF%BC%9A%28%E5%86%8D%E7%8F%BE%E6%89%8B%E9%A0%86%E3%81%AB%E8%A8%98%E8%BC%89%E3%81%97%E3%81%AA%E3%81%8B%E3%81%A3%E3%81%9F%E5%86%85%E5%AE%B9%E7%AD%89%29%0A%0A%E3%83%89%E3%82%AD%E3%83%A5%E3%83%A1%E3%83%B3%E3%83%88%E9%96%A2%E9%80%A3%E7%AE%87%E6%89%80%EF%BC%9A%28WEKO3%E9%96%A2%E9%80%A3%E3%83%9E%E3%83%8B%E3%83%A5%E3%82%A2%E3%83%AB%E7%AD%89%E3%81%AE%E8%A9%B2%E5%BD%93%E7%AE%87%E6%89%80%E3%81%AE%E7%AB%A0%E7%AF%80%E7%95%AA%E5%8F%B7%E7%AD%89%29%0A%0A%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB%E6%B7%BB%E4%BB%98%EF%BC%9A%28%E8%A9%B2%E5%BD%93%E7%94%BB%E9%9D%A2%E3%82%AD%E3%83%A3%E3%83%97%E3%83%81%E3%83%A3%E7%AD%89%29
      - paragraph [ref=e5399]:
        - text: ※ メールソフトが自動で立ち上がらない場合は、以下の設定を変更してください。
        - text: （Windowsの場合）設定 → アプリ → 既定のアプリ → メール → 「MAILTO」のアプリを Outlook、Thunderbird 等に変更。
      - paragraph [ref=e5400]:
        - text: ● 注意事項はこちらをご覧ください：
        - link "https://jpcoar.repo.nii.ac.jp/jpcoarml" [ref=e5401] [cursor=pointer]:
          - /url: https://jpcoar.org/support/communitytools/jpcoar-jairo-cloud-community-ml/
      - paragraph [ref=e5402]: ※ 投稿内容は広く共有される可能性がありますので、パスワード等機密情報は投稿しないようご注意ください。
      - heading "１．ユーザーアカウントの登録" [level=2] [ref=e5403]
      - paragraph [ref=e5404]:
        - text: (1) 「ユーザー登録のご案内」メールにあるURLをクリックします。
        - text: メールが届いてから7日以内に手続きを行ってください。
        - text: （メールが届かない場合は、[spam]扱いになっていないか、確認してください。）
      - paragraph [ref=e5405]
      - paragraph [ref=e5406]: (2) 必要な情報を入力します。
      - paragraph [ref=e5407]
      - paragraph [ref=e5408]: 【注意事項】
      - list [ref=e5409]:
        - listitem [ref=e5410]: ［ユーザーID］［表示名］［パスワード］はお好きなものを設定できます。ただし、機関管理者のユーザーアカウントは、ご担当者様が変更になった際も、引継ぎして頂けるものをおすすめしています（例：ご担当者様の個人名ではなく、大学名や部署名など）。
        - listitem [ref=e5411]: ［ユーザーID］は後から変更できません。
        - listitem [ref=e5412]: ［表示名］［メールアドレス］［パスワード］は、登録完了後、随時変更できます。
        - listitem [ref=e5413]: ［ユーザーID］がすでに登録されている場合や、［パスワード］の強度が［平均(50%)］以下の場合、［登録する］ボタンを押せません。
      - paragraph [ref=e5414]: (3) 登録ボタンをクリックします。
      - heading "２．ユーザーアカウント情報のダウンロード" [level=2] [ref=e5415]
      - paragraph [ref=e5416]: (1) 機関管理者または「図書館員」の権限を持ったユーザーで、下記の機関管理メニューにログインします。
      - paragraph [ref=e5417]: https://idp.repo.nii.ac.jp/admin/menu/XXX/ （XXXは機関のホスト名）
      - paragraph [ref=e5418]: ログイン画面が表示されるので、機関管理者のユーザーIDとパスワードを入力し、ログインします。
      - paragraph [ref=e5419]
      - paragraph [ref=e5420]: (2) ［ユーザー情報管理］をクリックします。
      - paragraph [ref=e5421]
      - paragraph [ref=e5422]: (3) ［会員情報をダウンロードする］をクリックします。
      - paragraph [ref=e5423]
      - paragraph [ref=e5424]: (4) ダウンロードします。
      - list [ref=e5425]:
        - listitem [ref=e5426]: 現在の情報を取得する場合、［現在の情報をダウンロードする］をクリック
        - listitem [ref=e5427]: 過去に更新した時点での情報を取得する場合、希望の日時をクリック
      - paragraph [ref=e5428]
      - paragraph [ref=e5429]: (5) ポップアップが表示されたら［保存］または［名前を付けて保存］をクリックします。
      - paragraph [ref=e5430]
      - heading "3．ユーザーアカウントの追加" [level=2] [ref=e5431]
      - paragraph [ref=e5432]: (1) 登録するユーザーアカウント情報をまとめたExcelファイルを用意します。
      - paragraph [ref=e5433]:
        - text: 「
        - link "2．ユーザーアカウント情報のダウンロード" [ref=e5434] [cursor=pointer]:
          - /url: "#m2"
        - text: 」でダウンロードしたExcelファイルに、ユーザーアカウントを追記します。
      - paragraph [ref=e5435]: ファイルはxls形式（Excel 97-2003ブック(*.xls)）で保存してください。
      - paragraph [ref=e5436]
      - list [ref=e5437]:
        - listitem [ref=e5438]:
          - text: 「
          - link "1．ユーザーアカウントの登録" [ref=e5439] [cursor=pointer]:
            - /url: "#m1"
          - text: 」で登録した機関管理者のアカウントはリストには含まれません
        - listitem [ref=e5440]: 既存ユーザーがいる場合、既存ユーザーの情報は消さず、空白行以下に新規ユーザーアカウント情報を追記してください
        - listitem [ref=e5441]: 複数ユーザーで1つのアカウントを共有しないようにしてください
      - paragraph [ref=e5442]: (2) 機関管理者または「図書館員」の権限を持ったユーザーで、下記の機関管理メニューにログインします。
      - paragraph [ref=e5443]: https://idp.repo.nii.ac.jp/admin/menu/XXX/ （XXXは機関のホスト名）
      - paragraph [ref=e5444]: ログイン画面が表示されるので、機関管理者のユーザーIDとパスワードを入力し、ログインします。
      - paragraph [ref=e5445]: "[ Excelファイルの入力項目 ] （全て入力必須）"
      - paragraph [ref=e5446]
      - paragraph [ref=e5447]: JAIRO Cloudアカウントが紐づくWEKOの権限は以下の通りです。
      - paragraph [ref=e5448]: "図書館員: Repository Administrator"
      - paragraph [ref=e5449]: "教員: Contributor"
      - paragraph [ref=e5450]: ※Community Administrator権限は現在JAIRO Cloudでは利用できません。
      - paragraph [ref=e5451]: (3) (1)で作成したExcelファイルをアップロードします。
      - paragraph [ref=e5452]
      - paragraph [ref=e5453]: (4) (3)で新規登録された各ユーザーが、届いたメールに従ってアカウント登録の手続きを行います。
      - paragraph [ref=e5454]:
        - text: 手続きの仕方は、「
        - link "1．ユーザーアカウントの登録" [ref=e5455] [cursor=pointer]:
          - /url: "#m1"
        - text: 」参照。
      - heading "4．ユーザーアカウント情報の検索" [level=2] [ref=e5456]
      - paragraph [ref=e5457]: (1)［ユーザー情報管理］から、［会員情報を検索する］をクリックします。
      - paragraph [ref=e5458]
      - paragraph [ref=e5459]: (2) ［会員番号］［表示名］［メールアドレス］のどれかを入力し、［検索］をクリックします。
      - paragraph [ref=e5460]
      - paragraph [ref=e5461]: (3) 検索結果が表示されます。
      - paragraph [ref=e5462]: 【 注意事項 】
      - paragraph [ref=e5463]:
        - text: 「
        - link "3．ユーザーアカウントの追加" [ref=e5464] [cursor=pointer]:
          - /url: "#m3"
        - text: 」の手順4の登録手続きを行っていないユーザーは、検索結果に表示されません。
      - heading "5．ユーザーアカウントの削除" [level=2] [ref=e5465]
      - paragraph [ref=e5466]:
        - text: (1) 機関管理者または「図書館員」の権限を持ったユーザーで、機関管理メニューにログインし、ユーザーアカウント情報をダウンロードする。（「
        - link "2．ユーザーアカウント情報のダウンロード" [ref=e5467] [cursor=pointer]:
          - /url: "#m2"
        - text: 」参照）
      - paragraph [ref=e5468]: (2) ダウンロードしたファイルを開き、削除したいユーザーを行ごと削除して、ファイルを上書き保存する。
      - paragraph [ref=e5469]
      - paragraph [ref=e5470]:
        - text: (3) (2)のファイルを機関管理メニューからアップロードする。「
        - link "3．ユーザーアカウントの追加" [ref=e5471] [cursor=pointer]:
          - /url: "#m3"
        - text: 」の手順3を参照してください。
      - separator [ref=e5472]
