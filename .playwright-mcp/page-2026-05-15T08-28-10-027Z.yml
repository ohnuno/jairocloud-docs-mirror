      - heading "［Import to GakuNin RDM］ボタン" [level=5] [ref=e754]
      - paragraph [ref=e755]: この機能は、WEKO3で公開されているGakuNin RDMプロジェクトアーカイブを、GakuNin RDMに新しいプロジェクトとしてインポートするためのものです。GakuNin RDMプロジェクトアーカイブはGakuNin RDM上でプロジェクトをエクスポートすることで作成されます。
      - paragraph [ref=e756]: 手順は以下の通りとなります。
      - list [ref=e757]:
        - listitem [ref=e758]: GakuNin RDMでプロジェクトをエクスポートします。
        - listitem [ref=e759]: WEKO3のアイテム個別登録画面からエクスポートしたファイル（GakuNin RDMプロジェクトアーカイブ）をアップロードします。
        - listitem [ref=e760]: MIME Typeが「application/zip」となるため「application/rdm-project」に変更します。
        - listitem [ref=e761]: ファイルのアクセスを「Open Access」または「Input Open Access Date」のいずれにかにします。
        - listitem [ref=e762]: 以上で、GakuNin RDMプロジェクトアーカイブの公開準備が整いました。
        - listitem [ref=e763]: GakuNin RDMプロジェクトアーカイブが公開状態にある場合、「Import to GakuNin RDM」ボタンを表示します。
