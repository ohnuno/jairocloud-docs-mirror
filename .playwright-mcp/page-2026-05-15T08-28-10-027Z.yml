9%29
      - paragraph [ref=e3593]:
        - text: ※ メールソフトが自動で立ち上がらない場合は、以下の設定を変更してください。
        - text: （Windowsの場合）設定 → アプリ → 既定のアプリ → メール → 「MAILTO」のアプリを Outlook、Thunderbird 等に変更。
      - paragraph [ref=e3594]:
        - text: ● 注意事項はこちらをご覧ください：
        - link "https://jpcoar.repo.nii.ac.jp/jpcoarml" [ref=e3595] [cursor=pointer]:
          - /url: https://jpcoar.org/support/communitytools/jpcoar-jairo-cloud-community-ml/
      - paragraph [ref=e3596]: ※ 投稿内容は広く共有される可能性がありますので、パスワード等機密情報は投稿しないようご注意ください。
      - heading "1．アイテムについて" [level=2] [ref=e3597]
      - paragraph [ref=e3598]: JAIRO Cloudに保管する情報の１単位です。アイテムを構成するデータは、コンテンツファイルおよびメタデータです。メタデータには、メタデータスキーマに規定されている記述項目や記述形式に準拠した情報が記載されています。
      - paragraph [ref=e3599]: 各アイテムにはJAIRO Cloud内で一意となるアイテムIDが割り当てられます。アイテムは1つのアイテムタイプに紐付いており、複数のアイテムタイプと紐付けることはできません。
      - paragraph [ref=e3600]: 異なるメタデータで構成させるアイテムを登録したい場合、新たなアイテムタイプを作成することで対応できます。
      - heading "2．個別登録事前準備（インデックス、アイテムタイプ、ワークフロー）" [level=2] [ref=e3601]
      - paragraph [ref=e3602]: アイテム登録の前にインデックス、アイテムタイプ、ワークフローの作成が必要です。詳細は下記を参照してください。
      - paragraph [ref=e3603]:
        - link "インデックス管理" [ref=e3604] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/index-management/
      - paragraph [ref=e3605]:
        - link "アイテムタイプ管理" [ref=e3606] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/itemtype/
      - paragraph [ref=e3607]:
        - link "ワークフロー管理" [ref=e3608] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/workflow/
      - heading "3．アイテムの登録" [level=2] [ref=e3609]
      - heading "３．１．アクティビティ" [level=3] [ref=e3610]
      - paragraph [ref=e3611]:
        - text: JAIRO Cloudにアイテムを登録する場合、ワークフローのアクティビティを登録する必要があります。
        - text: アクティビティの登録は、登録ユーザーでログイン後の［ワークフロー］画面から実施します。
        - text: （［ワークフロー］画面は［Main contents］のタブメニューにあります。）
      - paragraph [ref=e3612]:
        - text: (1)［Main contents］の「Top」画面から［ワークフロー］タブをクリックします。
        - text: ［アクティビティ一覧］画面が表示されます。
      - paragraph [ref=e3613]
      - paragraph [ref=e3614]:
        - text: (2) 表示された［アクティビティ一覧］画面の右下にある［+New Activity］ボタンをクリックします。
        - text: ［ワークフロー選択］画面が表示されます。
      - paragraph [ref=e3615]
      - paragraph [ref=e3616]: (3) 表示された［ワークフロー選択］画面の登録するアイテムに対応するワークフローの［+新規］ボタンをクリックします。
      - paragraph [ref=e3617]
      - paragraph [ref=e3618]: ［ワークフロー選択］画面の項目と説明
      - table [ref=e3619]:
        - rowgroup [ref=e3620]:
          - row "項番 項目 説明" [ref=e3621]:
            - columnheader "項番" [ref=e3622]
            - columnheader "項目" [ref=e3623]
            - columnheader "説明" [ref=e3624]
        - rowgroup [ref=e3625]:
          - row "1 ワークフロー アイテムタイプとフローを組み合わせたデータ登録の一連の処理です。「図書館員」の権限を持ったユーザーが作成します。" [ref=e3626]:
            - cell "1" [ref=e3627]
            - cell "ワークフロー" [ref=e3628]
            - cell "アイテムタイプとフローを組み合わせたデータ登録の一連の処理です。「図書館員」の権限を持ったユーザーが作成します。" [ref=e3629]
          - row "2 アイテムタイプ アイテムに登録するメタデータのデータ型です。" [ref=e3630]:
            - cell "2" [ref=e3631]
            - cell "アイテムタイプ" [ref=e3632]
            - cell "アイテムに登録するメタデータのデータ型です。" [ref=e3633]
          - row "3 フロー データを登録する際に実行する処理（アクション）の組み合わせです。アクションについては下記「［ステップ］画面のアクション名と説明」を参照してください。" [ref=e3634]:
            - cell "3" [ref=e3635]
            - cell "フロー" [ref=e3636]
            - cell "データを登録する際に実行する処理（アクション）の組み合わせです。アクションについては下記「［ステップ］画面のアクション名と説明」を参照してください。" [ref=e3637]:
              - text: データを登録する際に実行する処理（アクション）の組み合わせです。アクションについては下記「
              - link "［ステップ］画面のアクション名と説明" [ref=e3638] [cursor=pointer]:
                - /url: "#m3.1.a"
              - text: 」を参照してください。
          - row "4 削除用フロー 削除時に実行されるフローです。削除用フローが設定されているワークフローで登録したアイテムの削除時は、ワークフローを経由して削除が行われます。" [ref=e3639]:
            - cell "4" [ref=e3640]
            - cell "削除用フロー" [ref=e3641]
            - cell "削除時に実行されるフローです。削除用フローが設定されているワークフローで登録したアイテムの削除時は、ワークフローを経由して削除が行われます。" [ref=e3642]
          - row "5 ［+新規］ボタン クリックするとアクティビティを作成し、［アクション］画面に遷移します。" [ref=e3643]:
            - cell "5" [ref=e3644]
            - cell "［+新規］ボタン" [ref=e3645]
            - cell "クリックするとアクティビティを作成し、［アクション］画面に遷移します。" [ref=e3646]
          - row "6 ［戻る］ボタン クリックすると、［アクティビティ一覧］画面に遷移します。" [ref=e3647]:
            - cell "6" [ref=e3648]
            - cell "［戻る］ボタン" [ref=e3649]
            - cell "クリックすると、［アクティビティ一覧］画面に遷移します。" [ref=e3650]
      - paragraph [ref=e3651]:
        - text: 選択したワークフローの先頭に登録されているフローの［ステップ］画面が表示されます。
        - text: ワークフローに紐づくフローに設定されたアクションにより、ステップの順番は異なります。
      - paragraph [ref=e3652]
      - paragraph [ref=e3653]: ［ステップ］画面のアクション名と説明
      - table [ref=e3654]:
        - rowgroup [ref=e3655]:
          - row "項番 アクション名 説明" [ref=e3656]:
            - columnheader "項番" [ref=e3657]
            - columnheader "アクション名" [ref=e3658]
            - columnheader "説明" [ref=e3659]
        - rowgroup [ref=e3660]:
          - row "1 Start アイテム登録開始のアクションです。" [ref=e3661]:
            - cell "1" [ref=e3662]
            - cell "Start" [ref=e3663]
            - cell "アイテム登録開始のアクションです。" [ref=e3664]
          - row "2 Item Registration アイテムのメタデータとコンテンツを登録し、所属するインデックスを設定するアクションです。" [ref=e3665]:
            - cell "2" [ref=e3666]
            - cell "Item Registration" [ref=e3667]
            - cell "アイテムのメタデータとコンテンツを登録し、所属するインデックスを設定するアクションです。" [ref=e3668]
          - row "3 Item Link アイテムにリンク設定するアクションです。" [ref=e3669]:
            - cell "3" [ref=e3670]
            - cell "Item Link" [ref=e3671]
            - cell "アイテムにリンク設定するアクションです。" [ref=e3672]
          - row "4 Identifier Grant アイテムにDOIを付与するアクションです。" [ref=e3673]:
            - cell "4" [ref=e3674]
            - cell "Identifier Grant" [ref=e3675]
            - cell "アイテムにDOIを付与するアクションです。" [ref=e3676]
          - row "5 Approval アイテムの査読／承認するアクションです。" [ref=e3677]:
            - cell "5" [ref=e3678]
            - cell "Approval" [ref=e3679]
            - cell "アイテムの査読／承認するアクションです。" [ref=e3680]
          - row "6 End アイテム登録終了のアクションです。" [ref=e3681]:
            - cell "6" [ref=e3682]
            - cell "End" [ref=e3683]
            - cell "アイテム登録終了のアクションです。" [ref=e3684]
      - paragraph [ref=e3685]:
        - text: (4) 表示されたフローの［ステップ］画面に対応するアクションを実施します。
        - text: 詳細については、「
        - link "３．２．メタデータ入力" [ref=e3686] [cursor=pointer]:
          - /url: "#m3.2"
        - text: 」以降を参照してください。
      - heading "３．２．メタデータ入力" [level=3] [ref=e3687]
      - paragraph [ref=e3688]: (1) アイテムのサムネイルを登録します。
      - paragraph [ref=e3689]: ① 表示された［Item Registration］画面で、［Drop files or folders here］に登録するファイルをドラッグ＆ドロップするか、［ファイル選択］ボタンをクリックします。
      - paragraph [ref=e3690]
      - paragraph [ref=e3691]: 「アップロードファイル選択」ダイアログが表示されます。
      - paragraph [ref=e3692]:
        - text: ② 表示された「アップロードファイル選択」ダイアログでアップロードするファイルを選択後、［開く］ボタンをクリックします。
        - text: ファイル情報が表示されます。
      - paragraph [ref=e3693]
      - paragraph [ref=e3694]: ［サムネイル登録］画面の項目と説明
      - table [ref=e3695]:
        - rowgroup [ref=e3696]:
          - row "項番 項目 説明" [ref=e3697]:
            - columnheader "項番" [ref=e3698]
            - columnheader "項目" [ref=e3699]
            - columnheader "説明" [ref=e3700]
        - rowgroup [ref=e3701]:
          - row "1 ファイル名 登録するファイル名が表示されます。" [ref=e3702]:
            - cell "1" [ref=e3703]
            - cell "ファイル名" [ref=e3704]
            - cell "登録するファイル名が表示されます。" [ref=e3705]
          - row "2 容量 登録するファイルのサイズが表示されます。 ※アップロードできるサイズの上限は20GBです。複数ファイルをアップロードする場合、合計で20GBが上限となります。" [ref=e3706]:
            - cell "2" [ref=e3707]
            - cell "容量" [ref=e3708]
            - cell "登録するファイルのサイズが表示されます。 ※アップロードできるサイズの上限は20GBです。複数ファイルをアップロードする場合、合計で20GBが上限となります。" [ref=e3709]
          - row "3 進捗 ファイルの登録が完了すると［✔］が表示されます。" [ref=e3710]:
            - cell "3" [ref=e3711]
            - cell "進捗" [ref=e3712]
            - cell "ファイルの登録が完了すると［✔］が表示されます。" [ref=e3713]
          - row "4 アクション ゴミ箱のアイコンをクリックすると、登録したファイルが削除されます。" [ref=e3714]:
            - cell "4" [ref=e3715]
            - cell "アクション" [ref=e3716]
            - cell "ゴミ箱のアイコンをクリックすると、登録したファイルが削除されます。" [ref=e3717]
      - paragraph [ref=e3718]:
        - text: (2) メタデータを自動的に入力します。
        - text: 外部データベースから書誌情報を取得し該当項目に自動入力できます。
      - paragraph [ref=e3719]: ① 外部データベースからメタデータを自動的に入力する場合は［メタデータ自動入力］ボタンをクリックします。
      - paragraph [ref=e3720]
      - paragraph [ref=e3721]: ② 表示された［メタデータの自動入力］で［ID選択］を選択し、IDを入力した後に［取得］ボタンをクリックします。
      - paragraph [ref=e3722]
      - paragraph [ref=e3723]: ［メタデータの自動入力］画面の項目と説明
      - table [ref=e3724]:
        - rowgroup [ref=e3725]:
          - row "項番 項目 説明" [ref=e3726]:
            - columnheader "項番" [ref=e3727]
            - columnheader "項目" [ref=e3728]
            - columnheader "説明" [ref=e3729]
        - rowgroup [ref=e3730]:
          - row "1 ID選択 外部データベースからメタデータを取得する方法を選択します。 利用できる取得方法は以下のとおりです。 ・DOI：DOI を入力してメタデータを取得します（※ システム管理者が設定した優先順位に従って外部 Web API （JaLC、DataCiteなど）へ問い合わせます）。 ・Crossref：Crossref DOI を入力すると Crossref API から情報を取得します。 ・CiNii：CiNii Research の CRID を使用して取得します。 ・WEKOID：リポジトリに登録済みのアイテムから取得します ・researchmap：researchmap に登録されている業績情報を基にメタデータを取得します。" [ref=e3731]:
            - cell "1" [ref=e3732]
            - cell "ID選択" [ref=e3733]
            - cell "外部データベースからメタデータを取得する方法を選択します。 利用できる取得方法は以下のとおりです。 ・DOI：DOI を入力してメタデータを取得します（※ システム管理者が設定した優先順位に従って外部 Web API （JaLC、DataCiteなど）へ問い合わせます）。 ・Crossref：Crossref DOI を入力すると Crossref API から情報を取得します。 ・CiNii：CiNii Research の CRID を使用して取得します。 ・WEKOID：リポジトリに登録済みのアイテムから取得します ・researchmap：researchmap に登録されている業績情報を基にメタデータを取得します。" [ref=e3734]:
              - text: 外部データベースからメタデータを取得する方法を選択します。 利用できる取得方法は以下のとおりです。 ・
              - strong [ref=e3735]: DOI
              - text: ：DOI を入力してメタデータを取得します（※ システム管理者が設定した優先順位に従って外部 Web API （JaLC、DataCiteなど）へ問い合わせます）。 ・
              - strong [ref=e3736]: Crossref
              - text: ：Crossref DOI を入力すると Crossref API から情報を取得します。 ・
              - strong [ref=e3737]: CiNii
              - text: ：CiNii Research の CRID を使用して取得します。 ・
              - strong [ref=e3738]: WEKOID
              - text: ：リポジトリに登録済みのアイテムから取得します ・
              - strong [ref=e3739]: researchmap
              - text: ：researchmap に登録されている業績情報を基にメタデータを取得します。
          - row "2 ID 該当するIDを入力します。 ・DOI：DOI ・Crossref：Crossref DOI ・CiNii：NAID (NII論文ID) ・WEKOID：アイテムID ・researchmap：parmalink※、業績種別、業績ID ※parmalinkとはresearchmapでの新規登録の際にご入力いただくリンク識別子のことを言います。「マイポータル」（researchmapの公開用ウェブページ）にアクセスするための研究者詳細ページURL末尾に付く英数字記号混合で3～20文字の文字列です。" [ref=e3740]:
            - cell "2" [ref=e3741]
            - cell "ID" [ref=e3742]
