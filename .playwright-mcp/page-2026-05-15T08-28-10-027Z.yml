      - paragraph [ref=e3757]:
        - text: 【注意事項】
        - text: メタデータ自動入力機能を利用するにはメタデータのJPCOARスキーマのマッピング設定がされている必要があります。マッピングの設定については
        - link "アイテムタイプ管理 ８．１．アイテムタイプをマッピングする" [ref=e3758] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/itemtype/#m8.1
        - text: をご覧ください。
      - paragraph [ref=e3759]:
        - text: 【補足】
        - text: 複数のプロパティに同じマッピング情報が設定されている場合、1つ目（1番上）のプロパティにのみセットします。
        - text: "（例：アイテムタイプの中に「ISBN」「ISSN」の順でプロパティが含まれており、いずれも「jpcoar: sourceIdentifier」にマッピングされていた場合、［メタデータの自動入力］でデータを取り込むと「ISBN」にデータがセットされます。）"
      - paragraph [ref=e3760]:
        - text: (3) 代理投稿者を設定します。
        - text: JAIRO Cloud上のユーザーアカウントを、編集中のアイテムの登録者として指定することができます。 「Username」、「Email」からユーザーを特定します。
      - paragraph [ref=e3761]: ① 表示された［Item Registration］画面で、代理投稿者[Contributor]の「Other user」をラジオボタンから選択します。
      - paragraph [ref=e3762]
      - paragraph [ref=e3763]: ユーザー情報入力項目が表示されます。
      - paragraph [ref=e3764]: ② 表示されたユーザー情報入力項目にユーザー名とメールアドレスを入力します。
      - paragraph [ref=e3765]
      - list [ref=e3766]:
        - listitem [ref=e3767]: ［Username］、または［Email］に入力すると、リポジトリに登録されているユーザーが候補一覧に表示されます。ユーザー候補一覧からユーザーを選択すると、選択したユーザーのユーザー名とメールアドレスが設定されます。
        - listitem [ref=e3768]: 投稿者として指定されたユーザーは、アイテム登録者と同様に該当アイテムの編集権限が付与されます。投稿者の設定は1つのユーザーのみにできます。
        - listitem [ref=e3769]: 「次へ」ボタンクリック時に入力したユーザーが存在しない場合、［Shared user information is not valid/Please check it again!］というエラーメッセージが表示されます。
        - listitem [ref=e3770]: 「次へ」ボタンクリック時に入力したユーザーがアイテム登録ユーザーの場合、［You cannot specify yourself in “Other users” setting.］というエラーメッセージが表示されます。
      - paragraph [ref=e3771]: (4) ファイルを登録します。
      - paragraph [ref=e3772]: ① 表示された［Item Registration］画面で、［Drop files or folders here］に登録するファイルをドラッグ＆ドロップするか、または［Click to select］ボタンをクリックします。
      - paragraph [ref=e3773]
      - paragraph [ref=e3774]: 「アップロードファイル選択」ダイアログが表示されます。
      - paragraph [ref=e3775]: ② 表示された「アップロードファイル選択」ダイアログでアップロードするファイルを選択した後、［開く］ボタンをクリックします。
