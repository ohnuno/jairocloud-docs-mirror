        - listitem [ref=e3119]: Admin > Setting > Identifier でprefixの設定があること
        - listitem [ref=e3120]: DOI： 「prefix」もしくは「prefix/」もしくは空欄であること
        - listitem [ref=e3121]:
          - text: DOI_RA：JaLC, Crossref, DataCite, NDL JalC のいずれかであること（現時点では、JaLC DataCite DOIまたはNDL JaLC DOIを付与することはできません）
          - text: DOI_RAにNDL JaLC DOIが指定されている場合、DOIの入力値によって、エラーメッセージが表示される場合があります。
          - list [ref=e3122]:
            - listitem [ref=e3123]:
              - text: DOIが空欄の場合
              - text: 「DOIは prefix/suffix の形式で指定して下さい。」／「Please specify DOI prefix/suffix.」
            - listitem [ref=e3124]:
              - text: prefixだけ含まれている場合(「prefix」もしくは「prefix/」を指定した場合）
              - text: 「DOI suffixを設定してください。」／「Please specify DOI suffix.」
      - paragraph [ref=e3125]:
        - text: ※DOIの付与はPID付与の
        - link "制約条件表" [ref=e3126] [cursor=pointer]:
          - /url: https://jpcoar.repo.nii.ac.jp/records/160
        - text: (JPCOAR_JaLC_Guideline_appendix_v1.pdf ) に従って、「必須」と「いずれか必須」の条件をもとにDOI付与可否を決定しています。なお、必須のマッピング項目がひとつのアイテムタイプ内に複数ある場合、複数あるうちのひとつだけ入力されていれば、DOI付与の条件を満たすものとします。
      - heading "３．アイテムの一括更新" [level=2] [ref=e3127]
