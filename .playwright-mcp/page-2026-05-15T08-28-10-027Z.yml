      - heading "３．４．DOIの付与" [level=2] [ref=e4560]
      - paragraph [ref=e4561]:
        - text: JAIRO Cloudでは
        - link "国立情報学研究所が取り纏めるJaLC準会員（外部サイトにリンクしています）" [ref=e4562] [cursor=pointer]:
          - /url: https://support.irdb.nii.ac.jp/ja/application/jalc
        - text: のみ[Identifier Grant]画面でのDOIの付与が可能です。
      - paragraph [ref=e4563]: DOIが付与されていないアイテムには、DOIを付与できます。
      - paragraph [ref=e4564]: DOIの取り扱いには十分注意してください。アイテムにDOIを付与する場合の注意事項を次に示します。
      - list [ref=e4565]:
        - listitem [ref=e4566]: アイテムに付与されたDOIは変更できません。
        - listitem [ref=e4567]: アイテムに付与されたDOIを取り下げることはできません。DOIを取り下げたい場合は、アイテムも取り下げてください。（※DOI取り下げ時はにログインしているアカウントのパスワード入力が必要となります）
        - listitem [ref=e4568]: DOI付与されているアイテムを削除することはできません。
        - listitem [ref=e4569]: DOI付与されているアイテムを非公開に変更することはできません。
        - listitem [ref=e4570]: アイテムにDOIを付与する場合、インデックス状態が「公開」かつハーベスト公開が「公開」のインデックスとの関連付けが必要です。
        - listitem [ref=e4571]: DOI付与条件の必須項目を満たしていない場合、Item Registration画面のアクティビティに戻り、エラーメッセージが表示されます。
        - listitem [ref=e4572]:
          - text: DOI付与条件は、選択しているDOI発行機関に応じて、アイテムの入力値を以下の資料を基にチェックしています。
          - text: 資料：
          - link "制約条件表" [ref=e4573] [cursor=pointer]:
            - /url: https://jpcoar.repo.nii.ac.jp/records/160
          - text: (JPCOAR_JaLC_Guideline_appendix_v1.pdf )
        - listitem [ref=e4574]: 必須のマッピング項目がひとつのアイテムタイプ内に複数ある場合、複数あるうちのひとつに入力されていれば、DOI付与の条件を満たすものとします。
        - listitem [ref=e4575]:
          - text: DOI付与済みアイテムを新規登録後、編集時に必須項目の値の削除や必須項目のプロパティの削除はできません。削除をした場合、［Identifier Grant］画面から［Item Registration］画面に遷移し、「PID付与の条件を満たしていません。」とエラーメッセージが表示されます。
          - text: また、編集時に資源タイプ（dc:type）の変更もできません。資源タイプを変更した場合、［Identifier Grant］画面から［Item Registration］画面に遷移し、「DOI付与済みアイテムの資源タイプの変更はできません。」とエラーメッセージが表示されます。
      - paragraph [ref=e4576]: アイテムにDOIを付与するフローの「Identifier Grant」の手順を説明します。
      - paragraph [ref=e4577]
      - paragraph [ref=e4578]: ［識別子の付与］画面
      - paragraph [ref=e4579]
      - paragraph [ref=e4580]: ［Identifier Grant］画面に管理画面の［Identifier］で設定しているプレフィックスと自動採番されたサフィックスが表示されます。
      - paragraph [ref=e4581]: ［識別子の付与］画面の項目と説明
