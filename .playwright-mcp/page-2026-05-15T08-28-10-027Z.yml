          - row "投稿権限 インデックスにアイテムを投稿する権限を設定します。 ［ロール権限あり］および［グループ権限あり］に表示されているロールおよびグループに所属しているユーザーが、そのインデックスにアイテムを登録できます。 ・ロール権限 ユーザー情報のベース権限ごとの投稿権限を設定します。 ［子インデックスのベース権限にも再帰的に反映させる］にチェックがある場合、所属する子インデックスと子孫インデックスすべてにロール権限の設定が再帰的に設定されます。 ・グループ ユーザーが所属しているグループごとの投稿権限を設定します。 ［子インデックスのグループにも再帰的に反映させる］にチェックがある場合、所属する子インデックスと子孫インデックスすべてにグループの設定が再帰的に設定されます。" [ref=e2402]:
            - cell "投稿権限" [ref=e2403]
            - cell "インデックスにアイテムを投稿する権限を設定します。 ［ロール権限あり］および［グループ権限あり］に表示されているロールおよびグループに所属しているユーザーが、そのインデックスにアイテムを登録できます。 ・ロール権限 ユーザー情報のベース権限ごとの投稿権限を設定します。 ［子インデックスのベース権限にも再帰的に反映させる］にチェックがある場合、所属する子インデックスと子孫インデックスすべてにロール権限の設定が再帰的に設定されます。 ・グループ ユーザーが所属しているグループごとの投稿権限を設定します。 ［子インデックスのグループにも再帰的に反映させる］にチェックがある場合、所属する子インデックスと子孫インデックスすべてにグループの設定が再帰的に設定されます。" [ref=e2404]
            - cell [ref=e2405]
            - cell [ref=e2406]
          - row "表示形式(検索結果) 検索結果の表示形式を選択します。※ ・［一覧形式］ 検索結果をアイテムの一覧で表示します。通常はこの形式で設定されています。 ・［目次形式］ 検索結果を見出しの一覧で表示します。" [ref=e2407]:
