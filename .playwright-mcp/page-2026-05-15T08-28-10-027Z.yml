      - heading "4．アイテムの更新" [level=2] [ref=e4667]
      - paragraph [ref=e4668]: アイテムの編集権限を持つ場合インデックスの配下のアイテムを編集できます。
      - heading "４．１．アイテムの更新" [level=3] [ref=e4669]
      - paragraph [ref=e4670]: (1) ［インデックスツリー］画面からインデックスをクリックします。
      - paragraph [ref=e4671]: ［アイテムリスト］画面が表示されます。
      - paragraph [ref=e4672]
      - paragraph [ref=e4673]: (2) 表示された［アイテムリスト］画面から編集するアイテムのタイトルをクリックします。
      - paragraph [ref=e4674]: ［アイテム詳細］画面が表示されます。
      - paragraph [ref=e4675]
      - paragraph [ref=e4676]: (3) 表示された［アイテム詳細］画面の［編集］ボタンをクリックします。
      - paragraph [ref=e4677]: ［Item Registration］画面が表示されます。
      - paragraph [ref=e4678]
      - paragraph [ref=e4679]:
        - text: 【注意事項】
        - text: 該当アイテムが編集中の場合、［The item is being edited.］というメッセージが表示されます。この場合に、アイテムを編集するために［アクティビティ一覧］画面から編集するアクティビティ名をクリックします。
      - paragraph [ref=e4680]
      - paragraph [ref=e4681]: ①［トップ］画面から［ワークフロー］タブをクリックします。
      - paragraph [ref=e4682]
      - paragraph [ref=e4683]: ②［ToDo］タブ、または［すべて］タブのいずれかを選択します。
      - paragraph [ref=e4684]: ［アクティビティ一覧］画面が表示されます。
      - paragraph [ref=e4685]
      - paragraph [ref=e4686]:
        - text: 【注意事項】
        - text: 複数のアクティビティを同時に実行することはできません。 既に実行済みのアクティビティがある状態でアクティビティを実行しようとすると以下の画面が表示されます。
      - paragraph [ref=e4687]
      - paragraph [ref=e4688]: 実行中のアクティビティを完了させるか、中止してください。
      - paragraph [ref=e4689]: また、同一のアクティビティを複数のタブで開こうとすると、以下の画面が表示されます。
      - paragraph [ref=e4690]
      - paragraph [ref=e4691]: 他に実行しているタブがないかを確認し、実行中のタブを終了してからアクティビティを再開してください。
      - paragraph [ref=e4692]: ※ウェブブラウザの状態によっては、同時実行判定に失敗する場合があります。 そのような場合は「Force Unlock」ボタンをクリックし、アクティビティを開始してください。
      - paragraph [ref=e4693]: ③表示された［アクティビティ一覧］画面から編集するアクティビティ名をクリックします。
      - paragraph [ref=e4694]: ［Item Registration］画面が表示されます。
      - paragraph [ref=e4695]
      - paragraph [ref=e4696]:
        - text: 【注意事項】
        - text: 一括登録を実行中に他端末および実行端末でアイテムの［編集］ボタンを押下した場合、メッセージ（日本語は［インポートを実行中のためアイテムの編集はできません。］、英語は［Item cannot be edited because the import is in progress.］）が表示され、アイテムの編集が行えません。
      - paragraph [ref=e4697]: この場合、一括登録の完了後にアイテムの編集を行ってください。
      - paragraph [ref=e4698]:
        - text: (4) 該当項目を編集します。
        - text: 各項目の編集方法の詳細は「
        - link "３．２．メタデータ入力" [ref=e4699] [cursor=pointer]:
          - /url: "#m3.2"
        - text: 」を参照してください。
      - paragraph [ref=e4700]: ※ ファイルを添付しているアイテムを編集する際に、ファイルの差し替えを行うことができます（ファイルを差し替えて、統計情報を引き継がせることができます）
      - paragraph [ref=e4701]: アイテム編集時にファイルが添付されている場合、Action欄に [Replace] ボタンが表示されます。ファイルを差し替える場合は、[Replace] ボタンを押下して、差し替えるファイルを登録してください。
      - paragraph [ref=e4702]
      - paragraph [ref=e4703]: "[Replace] ボタンを押下すると「アップロードファイル選択」ダイアログが開き、ファイルを選択すると、選択後のファイル名が画面上に赤文字で表示されます。"
      - paragraph [ref=e4704]: "[Start upload] ボタンを押下してファイルの取り込みを行ってください。差し替え前のファイル情報プロパティのファイル名、本文URL、フォーマット、サイズの情報が上書きされます。"
      - paragraph [ref=e4705]
      - paragraph [ref=e4706]:
        - text: ※ ファイルの差し替えを行う場合、旧バージョンのファイルの差し替えは行われません（2021/6/29 アップデート時点での動作）。
        - text: ※ ファイルの差し替え後、［アイテム詳細画面］ > ［Information画面］で差し替え前の統計値が維持され、差し替え後の統計値が集計されます（2021/6/29 アップデート時点での動作）。なお、ファイルの差し替え後の定型レポート、カスタムレポートの統計値については、
        - link "「統計機能」 1．定型レポートの出力" [ref=e4707] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/statistics/#m1
        - text: 、及び
        - link "2．カスタムレポートの出力" [ref=e4708] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/statistics/#m2
        - text: を参照してください。
      - paragraph [ref=e4709]: (5) ［バージョン管理］を選択します。
      - paragraph [ref=e4710]
      - list [ref=e4711]:
        - listitem [ref=e4712]: ［バージョンの変更］を選択する場合、編集したアイテムのバージョンがアップされて、アイテムが更新されます。
        - listitem [ref=e4713]:
          - text: ［バージョンの維持］を選択する場合、現在のバージョンが維持されて、アイテムが更新されます。
          - text: ※［バージョン管理］は入力必須項目です。
          - text: ※ デフォルトは［バージョンの維持］です。
      - paragraph [ref=e4714]: ［バージョンを更新する］を選択した場合、アイテム詳細画面の[バージョン]に新しいバージョンが追加されます。
      - paragraph [ref=e4715]
      - paragraph [ref=e4716]:
        - text: アイテム詳細画面で過去のバージョンを表示している際は、アイテム詳細画面上部に「このレコードの
        - strong [ref=e4717]: 新しいバージョン
        - text: があります。」と表示されます。
      - paragraph [ref=e4718]
      - paragraph [ref=e4719]:
        - text: ※
        - link "ファイルの差し替え" [ref=e4720] [cursor=pointer]:
          - /url: "#m4.1-4"
        - text: を行う場合、［バージョン管理］で［バージョンを更新する］を選択すると、本更新で作成される旧バージョンでは差し替え前のファイルを閲覧・ダウンロードできる状態になります（2021/6/29 アップデート時点での動作）。
      - paragraph [ref=e4721]:
        - text: ※
        - link "ファイルの差し替え" [ref=e4722] [cursor=pointer]:
          - /url: "#m4.1-4"
        - text: を行う場合、［バージョン管理］の設定によって、カスタムレポートの集計方法が異なります（2021/6/29 アップデート時点での動作）。詳しくは
        - link "「統計機能」 2．カスタムレポートの出力" [ref=e4723] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/statistics/#m2
        - text: を参照してください。
      - paragraph [ref=e4724]: (6) ［次へ］ボタンをクリックします。
      - paragraph [ref=e4725]: ［インデックス指定］画面が表示されます。
      - paragraph [ref=e4726]: (7) ［完了］ボタンをクリックします。
      - paragraph [ref=e4727]:
        - text: 定義されているフローによって次のアクションに進みます。
        - text: アイテムが［Approval］画面で「承認」されると、アイテムが更新されます。
      - paragraph [ref=e4728]:
        - text: 【注意事項】
        - text: アイテムの編集後、旧バージョンは以前の公開ステータスをそのまま引き継ぎます。
      - heading "４．２．DOIの取り下げ" [level=3] [ref=e4729]
      - paragraph [ref=e4730]: (1) DOIを取り下げたいアイテムの［アイテム詳細］で、画面の［編集］ボタンをクリックします。
      - paragraph [ref=e4731]:
        - text: ［Item Registration］画面が表示されます。
        - text: ※ 詳細な手順は「
        - link "４．１．アイテムの更新" [ref=e4732] [cursor=pointer]:
          - /url: "#m4.1"
        - text: 」の (1) ～ (3) を参照してください。
      - paragraph [ref=e4733]: (2) ［次へ］ボタンをクリックして［Identifier Grant］画面まで進み、［DOIの取り下げ］をクリックします。
      - paragraph [ref=e4734]
      - paragraph [ref=e4735]: (3) ポップアップが表示されるので、［Password］欄にパスワードとして半角大文字「DELETE」を入力し、［継続］ボタンをクリックします。
      - paragraph [ref=e4736]
      - paragraph [ref=e4737]: DOIが取り下げられます。
      - paragraph [ref=e4738]
      - paragraph [ref=e4739]:
        - text: 【注意事項】
        - text: DOIの取り下げはアクティビティの途中でも即座に反映されます。
        - text: （ アクティビティを承認せず却下または強制終了しても、「DOIの取り下げ」は実行済のため、キャンセルできません。）
      - heading "５．アイテムの削除" [level=2] [ref=e4740]
      - paragraph [ref=e4741]:
        - text: アイテムの編集権限を持つ場合、アイテムを削除できます。
        - text: アイテムを削除可能なユーザー権限は管理者、アイテムの登録者および代理投稿者です。
      - paragraph [ref=e4742]: (1) ［インデックスツリー］画面からインデックスをクリックします。
      - paragraph [ref=e4743]: ［アイテムリスト］画面が表示されます。
      - paragraph [ref=e4744]: (2) 表示された［アイテムリスト］画面から削除するアイテムのタイトルをクリックします。
      - paragraph [ref=e4745]: ［アイテム詳細］画面が表示されます。
      - paragraph [ref=e4746]
      - paragraph [ref=e4747]: (3) 表示された［アイテム詳細］画面の［削除］ボタンをクリックします。
      - paragraph [ref=e4748]: 権限がないユーザーに対しては、［アイテム詳細］画面に［削除］ボタンが表示されません。
      - paragraph [ref=e4749]
      - paragraph [ref=e4750]:
        - text: 【注意事項】
        - text: 権限がないユーザーに対して、アイテム詳細画面に［削除］ボタンは表示されません。
      - paragraph [ref=e4751]: アイテムの旧バージョンには、［削除］ボタンが表示されません。また、最新バージョンが削除された時は該当アイテムの旧バージョンもすべて論理削除されます。
      - paragraph [ref=e4752]: 一括登録を実行中に他端末および実行端末でアイテムの［削除］ボタンを押下した場合、メッセージ「インポートを実行中のためアイテムの削除はできません。」が表示されます。この場合、一括登録の完了後にアイテムの削除を行ってください。
      - paragraph [ref=e4753]: ［削除確認］画面が表示されます。
      - paragraph [ref=e4754]
      - paragraph [ref=e4755]: 表 ［削除確認］画面の項目と説明
      - table [ref=e4756]:
        - rowgroup [ref=e4757]:
          - row "項番 項目 説明" [ref=e4758]:
            - columnheader "項番" [ref=e4759]
            - columnheader "項目" [ref=e4760]
            - columnheader "説明" [ref=e4761]
        - rowgroup [ref=e4762]:
          - row "1 ［OK］ボタン クリックすると、アイテムが削除されます。［アイテムリスト］画面に戻ります。" [ref=e4763]:
            - cell "1" [ref=e4764]
            - cell "［OK］ボタン" [ref=e4765]
            - cell "クリックすると、アイテムが削除されます。［アイテムリスト］画面に戻ります。" [ref=e4766]
          - row "2 ［キャンセル］ボタン クリックすると、アイテムは削除されず［削除確認］画面が閉じます。" [ref=e4767]:
            - cell "2" [ref=e4768]
            - cell "［キャンセル］ボタン" [ref=e4769]
            - cell "クリックすると、アイテムは削除されず［削除確認］画面が閉じます。" [ref=e4770]
      - paragraph [ref=e4771]: (4) ［OK］ボタンをクリックします。
      - paragraph [ref=e4772]: アイテムが削除されます。
      - paragraph [ref=e4773]:
        - text: 【注意事項】
        - text: アイテム削除後に、該当アイテムのURLを直接指定してアイテム詳細画面を表示すると、メッセージ「このアイテムは削除されています。」が表示されます。
