      - heading "1．アイテムタイプについて" [level=2] [ref=e4835]
      - paragraph [ref=e4836]: JAIRO Cloudでアイテムタイプとは、アイテムに登録するメタデータのデータ型を定義したものを指します。
      - heading "1．1．デフォルトアイテムタイプ" [level=3] [ref=e4837]
      - paragraph [ref=e4838]: デフォルトアイテムタイプとして、以下の２種類が用意されています。
      - list [ref=e4839]:
        - listitem [ref=e4840]: デフォルトアイテムタイプ（シンプル）
        - listitem [ref=e4841]: デフォルトアイテムタイプ（フル）
      - paragraph [ref=e4842]:
        - text: ※デフォルトアイテムタイプは、今後のサービスのバージョンアップの際、機械的な更新を実施する可能性があります。
        - text: 項目の追加以外の修正は上書きされる可能性があります。上書きを避けたい場合は、アイテムタイプをコピーしてご利用ください。（
        - link "4．4．アイテムタイプを別名で保存する" [ref=e4843] [cursor=pointer]:
          - /url: "#m4.4"
        - text: ）
      - paragraph [ref=e4844]:
        - text: 【補足】
        - text: 「作成者識別子Scheme」「寄与者識別子Scheme」「権利者識別子Scheme」について、選択肢等表示エリアには「Separate options with the | character」と表示されています。これらの項目は、著者DB管理＞編集画面のID Prefixタブにある「Scheme」のリストを参照し、アイテム登録時の「Item Registration」画面の各項目のプルダウンのリストとして表示されます。
      - heading "2．アイテムタイプの表示" [level=2] [ref=e4845]
      - paragraph [ref=e4846]: アイテム登録に利用するアイテムタイプを作成または編集できます。
      - paragraph [ref=e4847]: メタデータの編集画面は、［Administration］へアクセスし、［アイテムタイプ管理］をクリックして［メタデータ］をクリックすると表示されます。
      - heading "3．アイテムタイプの登録" [level=2] [ref=e4848]
      - heading "3．1．アイテムタイプの種類ごとに実行できる操作" [level=3] [ref=e4849]
      - paragraph [ref=e4850]: メタデータの編集画面で、アイテムタイプを切り替えることができます。
      - paragraph [ref=e4851]
      - paragraph [ref=e4852]: ［標準アイテムタイプ］を選択すると、アイテム登録に利用できるアイテムタイプが表示されます。
      - paragraph [ref=e4853]: ［ハーベスト用アイテムタイプ］を選択すると、ハーベストだけで利用できるアイテムタイプが表示されます。
      - paragraph [ref=e4854]: このアイテムタイプは、アイテム登録では利用できません。
      - paragraph [ref=e4855]: アイテムタイプに実施できる操作を次に示します。
