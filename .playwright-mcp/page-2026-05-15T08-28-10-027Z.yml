      - heading "1．定型レポートの出力" [level=2] [ref=e5241]
      - heading "1．1．ダウンロードする" [level=3] [ref=e5242]
      - paragraph [ref=e5243]: (1) ［統計］＞［運用レポート］をクリックします。
      - paragraph [ref=e5244]: (2) レポートの管理画面の［定型レポート］の［月別集計］で、［タイプ］、［年］、および［月］を選びます。
      - paragraph [ref=e5245]:
        - text: ［タイプ］として選択できる項目については、「
        - link "定型レポートのタイプ一覧" [ref=e5246] [cursor=pointer]:
          - /url: "#m1.1-list"
        - text: 」を参照してください。
      - paragraph [ref=e5247]:
        - link:
          - /url: https://jpcoar.org/system/wp-content/uploads/2026/02/jc_stat10.png
      - paragraph [ref=e5248]: (3) ［ダウンロード］をクリックします。
      - paragraph [ref=e5249]: 定型レポートがダウンロードされます。
      - paragraph [ref=e5250]: 定型レポートでダウンロードできるファイルは、11種類のTSV（タブ区切りテキスト）形式ファイルです。
