      - paragraph [ref=e3161]: ※ アイテムに複数のバージョンが存在する場合、アイテムの最新バージョンのみ一括出力されます（古いバージョンは一括出力されません）。
      - paragraph [ref=e3162]: データを編集後、インポートします。
      - paragraph [ref=e3163]:
        - text: 詳細は「
        - link "２．アイテムの一括登録」(4)" [ref=e3164] [cursor=pointer]:
          - /url: "#m2-4"
        - text: 以降を参照してください。
      - paragraph [ref=e3165]: ※DOI付与済みアイテムを新規登録後、更新時に必須項目の値の削除や必須項目のプロパティの削除はできません。削除をした場合、インポートタブのチェック処理で「PID付与の条件を満たしていません。」とエラーメッセージが表示されます。
      - paragraph [ref=e3166]:
        - text: また、更新時の資源タイプ（dc:type）の変更は同種資源タイプ（対応するJaLCコンテンツ種別が同じになる資源タイプ。JaLCコンテンツ種別については
        - 'link "「IRDBデータ提供機関のための DOI管理・メタデータ入力ガイドライン : JPCOARスキーマ ver1.0.x編」" [ref=e3167] [cursor=pointer]':
          - /url: https://jpcoar.repo.nii.ac.jp/records/160
        - text: 別表1を参照）に限定して可能です。それ以外の資源タイプに変更した場合、インポートタブのチェック処理で「DOI付与済みアイテムの資源タイプの変更はできません。」とエラーメッセージが表示されます。
      - paragraph [ref=e3168]: ※アイテムの更新時に、必須項目以外のメタデータの値を空欄にして更新した場合、空欄にした値はメタデータから削除されます。
      - paragraph [ref=e3169]:
        - text: ※既存アイテムの元ファイルが同名で、かつファイルパスも同一のものが含まれていた場合、ファイル登録時の挙動は以下の通りです。
        - text: "－Keep: 重複登録しない"
        - text: "－Upgrade: 重複登録する（※ファイル名だけでは、同名同ファイルなのか同名異ファイルなのかが判断できないため）"
      - paragraph [ref=e3170]: ※インポートファイルでの登録、更新時、同一内容のメッセージが複数表示される場合がありますが、処理には問題はありません（修正予定）。
      - paragraph [ref=e3171]: ※インデックスの日本語名が入力されていない場合、インポートがエラーとなります。
      - paragraph [ref=e3172]: ※存在しないインデックスは指定しないでください。アイテム登録が正常に行われません。
      - paragraph [ref=e3173]: ※ ファイルを添付しているアイテムを編集する際に、ファイルの差し替えを行うことができます（ファイルを差し替えて、統計情報を引き継がせることができます）。
      - paragraph [ref=e3174]: 一括出力したデータを以下の通りに編集してから、インポートしてください。
      - paragraph [ref=e3175]:
        - text: 1.「アイテムタイプ名(アイテムタイプID).tsv」の修正
        - text: a.【必須】ヘッダ項目（3行目）Keep/Upgrade Versionを設定します。
        - text: ※ Keep/Upgrade Versionで「Upgrade」を設定した場合、本更新で作成される旧バージョンでは差し替え前のファイルを閲覧・ダウンロードできる状態になります（2021/6/29 アップデート時点での動作）。
        - text: ※ Keep/Upgrade Versionの設定によって、カスタムレポートの統計値の集計方法が異なります（2021/6/29 アップデート時点での動作） 。詳しくは
        - link "「統計機能」 2．カスタムレポートの出力" [ref=e3176] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/statistics/#m2
        - text: を参照してください。
        - text: b.【必須】ヘッダ項目（3行目）.ファイルパス[n]に記載されている「recid_n/差し替え対象ファイル名（拡張子含む）」の「差し替え対象ファイル名（拡張子含む）」部分を、差し替え後のファイル名（拡張子含む）に修正します。
        - text: ※ファイルを格納するフォルダを指定する「recid_n/」を削除、編集しないよう注意してください。
        - text: c.【必須】ヘッダ項目（3行目）ファイル情報[n].ファイル名を、差し替えたいファイルのファイル名（拡張子含む）に変更します。
        - text: d.【任意】コンテンツファイルに関するメタデータ（サイズ、フォーマット等）を必要に応じて変更します。
      - paragraph [ref=e3177]
      - paragraph [ref=e3178]:
        - text: 2.差し換えたいコンテンツファイルの格納
        - text: a.【必須】差し替え対象となるコンテンツファイルが格納されているフォルダ［recid_n］に、差し替えたいファイルを格納します。
        - text: ※手順「1-b」で確認可能なヘッダ項目（3行目）.ファイルパス[n]に記載された「recid_n/差し替え対象ファイル名（拡張子含む）」の「recid_n」が作業対象のフォルダ名称となります。
        - text: b.【任意】差し替え対象となるコンテンツファイルを削除します。
        - text: ※削除しない場合も「
        - emphasis [ref=e3179]: アイテムタイプ名(アイテムタイプID).tsv
