9%29
      - paragraph [ref=e5492]:
        - text: ※ メールソフトが自動で立ち上がらない場合は、以下の設定を変更してください。
        - text: （Windowsの場合）設定 → アプリ → 既定のアプリ → メール → 「MAILTO」のアプリを Outlook、Thunderbird 等に変更。
      - paragraph [ref=e5493]:
        - text: ● 注意事項はこちらをご覧ください：
        - link "https://jpcoar.repo.nii.ac.jp/jpcoarml" [ref=e5494] [cursor=pointer]:
          - /url: https://jpcoar.org/support/communitytools/jpcoar-jairo-cloud-community-ml/
      - paragraph [ref=e5495]: ※ 投稿内容は広く共有される可能性がありますので、パスワード等機密情報は投稿しないようご注意ください。
      - heading "1．ワークフローについて" [level=2] [ref=e5496]
      - paragraph [ref=e5497]: JAIRO Cloudでワークフローとは、リポジトリへのアイテム登録、メタデータの入力、査読・承認といった作業（アイテムの登録から公開まで）の処理手続きを定義したもの、またその業務の流れを指します。
      - paragraph [ref=e5498]: ワークフローは、フロー（アイテムをシステムに保存するまでの一連の作業をグループ化したもの）とアイテムタイプの組み合わせで登録します。
      - paragraph [ref=e5499]: ワークフローの登録は、アイテム登録前に行っておく必要があります。
      - heading "2．ワークフローの表示" [level=2] [ref=e5500]
      - paragraph [ref=e5501]: (1) ログイン後、［Administration］にアクセスします。
      - paragraph [ref=e5502]: (2) ［ワークフロー管理］をクリックし、［ワークフロー］をクリックします。
      - paragraph [ref=e5503]
      - paragraph [ref=e5504]: 登録されているワークフローが表示されます。
      - heading "3．ワークフローの登録" [level=2] [ref=e5505]
      - heading "3．1．フローを追加する" [level=3] [ref=e5506]
      - paragraph [ref=e5507]:
        - text: この手順で作成したフローは、アクションが登録されていない状態です。フローにアクションを追加する方法については、「
        - link "3．2．フローのアクションを編集する" [ref=e5508] [cursor=pointer]:
          - /url: "#m3.2"
        - text: 」を参照してください。
      - paragraph [ref=e5509]: (1) ログイン後、［Administration］にアクセスします。
      - paragraph [ref=e5510]: (2) ［ワークフロー管理］をクリックし、［フロー］をクリックします。
      - paragraph [ref=e5511]: (3) ［+フロー作成］をクリックします。
      - paragraph [ref=e5512]: 編集画面が表示されます。
      - paragraph [ref=e5513]
      - paragraph [ref=e5514]: (4) フローの名前を入力します。
      - paragraph [ref=e5515]
      - paragraph [ref=e5516]: (5) ［保存］をクリックします。
      - paragraph [ref=e5517]: フローが追加されます。
      - paragraph [ref=e5518]: ［Start］及び［End］アクションがフローに自動追加されて、フローのステータスが［作成中］になります。
      - paragraph [ref=e5519]
      - paragraph [ref=e5520]: 入力されたフローの名前がシステムに存在する場合、エラーメッセージが表示されますので、名称を変更してから、再度［保存］をクリックしてください。
      - paragraph [ref=e5521]
      - paragraph [ref=e5522]:
        - text: フローにアクションを追加する方法については、
        - link "3．2．フローのアクションを編集する" [ref=e5523] [cursor=pointer]:
          - /url: "#m3.2"
        - text: を参照してください。
      - heading "3．1．1．削除フローを追加する" [level=4] [ref=e5524]
      - paragraph [ref=e5525]: 削除フローとは、アイテムの削除を行うための一連の作業をグループ化したものです。削除フローを登録することで、アイテムの削除に対して承認アクションを設定することができます。
      - paragraph [ref=e5526]
      - paragraph [ref=e5527]: 削除フローの追加方法は、通常のフローの追加方法と同様です。ただし、以下の点に注意してください。
      - list [ref=e5528]:
        - listitem [ref=e5529]: 削除フローとして追加する場合、「削除用」チェックボックスにチェックを入れる必要があります。
        - listitem [ref=e5530]: 削除フローとして保存した後は、通常のフローに戻すことができません。
        - listitem [ref=e5531]:
          - text: 削除フローは、アイテムの削除に対して設定できるアクションは「Approval」のみで、その他のアクションは設定できません。
          - text: 削除フローに承認アクションを追加する方法については、
          - link "3．2．フローのアクションを編集する" [ref=e5532] [cursor=pointer]:
            - /url: "#m3.2"
          - text: を参照してください。
      - heading "3．2．フローのアクションを編集する" [level=3] [ref=e5533]
      - paragraph [ref=e5534]: (1) ［フロー］でフロー名をクリックします。
      - paragraph [ref=e5535]: 編集画面が表示されます。
      - paragraph [ref=e5536]
      - paragraph [ref=e5537]: (2) アクションを実行するロールまたはユーザーを限定する場合、ドロップダウンリストで選択します。
      - paragraph [ref=e5538]: ロールおよびユーザーには、どの承認フローで誰にメールを送信するかを画面で設定することができます。
      - paragraph [ref=e5539]
      - paragraph [ref=e5540]: (3) アクションを追加または削除する場合、［+アクション追加］をクリックします。
      - paragraph [ref=e5541]: アクション一覧が表示されます。
      - paragraph [ref=e5542]
      - paragraph [ref=e5543]: (4) アクションを追加する場合［適用］をクリックします。
      - paragraph [ref=e5544]: アクションを削除する場合、［無効］をクリックします。
      - paragraph [ref=e5545]:
        - text: 各アクションについては、
        - link "「アイテム個別登録」3．1．アクティビティ［ステップ］画面のアクション名と説明" [ref=e5546] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/item-registration/#m3.1.a
        - text: を参照してください。
      - paragraph [ref=e5547]: アクションが追加または削除されます。
      - paragraph [ref=e5548]
      - paragraph [ref=e5549]: ※「Approval」の「適用」ボタンを複数回押すことで、アクション一覧に「Approval」を複数追加することができます。アクション名は「Approval(1)」のように枝番が付与されます。
      - paragraph [ref=e5550]: また、複数ある場合でも「無効」ボタンを押下することで、アクション一覧から「Approval」を削除することができます。削除はアクション一覧に並ぶ「Approval」のうち枝番が一番大きいものから削除されます。
      - paragraph [ref=e5551]: (5) アクションの順序を変更する場合、［順序変更］で上下に移動します。
      - paragraph [ref=e5552]
      - paragraph [ref=e5553]: (6) 画面の下部に表示されている［保存］をクリックします。
      - paragraph [ref=e5554]: フローが保存されます。正常に保存できた場合、「Updated flow action successfully.」と表示されます。
      - paragraph [ref=e5555]
      - heading "3．3．フローを削除する" [level=3] [ref=e5556]
      - paragraph [ref=e5557]: (1) ［フロー］でフロー名をクリックします。
      - paragraph [ref=e5558]: 編集画面が表示されます。
      - paragraph [ref=e5559]
      - paragraph [ref=e5560]: (2) ［削除］をクリックします。
      - paragraph [ref=e5561]: フローが削除されます。
      - paragraph [ref=e5562]
      - paragraph [ref=e5563]:
        - text: 【注意事項】
        - text: 対象のフローがワークフローで使用されている場合、削除できません。［削除］をクリックすると、エラーメッセージが表示されます。
      - paragraph [ref=e5564]
      - heading "3．4．ワークフローを追加する" [level=3] [ref=e5565]
      - paragraph [ref=e5566]: (1) ［ワークフロー］で［+フロー作成］をクリックします。
      - paragraph [ref=e5567]: ワークフローの新規作成画面が表示されます。
      - paragraph [ref=e5568]
      - paragraph [ref=e5569]: (2) ワークフローの名前を入力、フローを選択し、アイテムタイプを選択します。
      - paragraph [ref=e5570]
      - table [ref=e5571]:
        - rowgroup [ref=e5572]:
          - row "項目 説明" [ref=e5573]:
            - columnheader "項目" [ref=e5574]
            - columnheader "説明" [ref=e5575]
        - rowgroup [ref=e5576]:
          - row "ワークフロー 登録したいワークフロー名を入力します。" [ref=e5577]:
            - cell "ワークフロー" [ref=e5578]
            - cell "登録したいワークフロー名を入力します。" [ref=e5579]
          - row "フロー 利用したいフローを選択します。プルダウンの選択肢は［フロー］画面で登録されたフローの一覧です。" [ref=e5580]:
            - cell "フロー" [ref=e5581]
            - cell "利用したいフローを選択します。プルダウンの選択肢は［フロー］画面で登録されたフローの一覧です。" [ref=e5582]
          - row "(For Delete) プルダウンから削除フローを選択します。フローが選択されると、アイテム削除時にワークフローが実行されるようになります。プルダウンの選択肢は、［フロー］画面で登録された削除フローの一覧です。" [ref=e5583]:
            - cell "(For Delete)" [ref=e5584]
            - cell "プルダウンから削除フローを選択します。フローが選択されると、アイテム削除時にワークフローが実行されるようになります。プルダウンの選択肢は、［フロー］画面で登録された削除フローの一覧です。" [ref=e5585]
          - row "アイテムタイプ ワークフローに指定したいアイテムタイプを選択します。プルダウンの選択肢は［メタデータ］画面で登録された標準アイテムタイプ一覧及びハーベスト用アイテムタイプ一覧です。" [ref=e5586]:
            - cell "アイテムタイプ" [ref=e5587]
            - cell "ワークフローに指定したいアイテムタイプを選択します。プルダウンの選択肢は［メタデータ］画面で登録された標準アイテムタイプ一覧及びハーベスト用アイテムタイプ一覧です。" [ref=e5588]
          - row "Repository ワークフローを登録するリポジトリを選択します。選択肢は、デフォルトの「Root Index」および［コミュニティ］画面で登録されたコミュニティ一覧です。" [ref=e5589]:
            - cell "Repository" [ref=e5590]
            - cell "ワークフローを登録するリポジトリを選択します。選択肢は、デフォルトの「Root Index」および［コミュニティ］画面で登録されたコミュニティ一覧です。" [ref=e5591]
          - row "利用申請フラグ デフォルトではチェックなしです。チェックありの場合、アイテム登録画面のコンテンツファイルの「提供方法」の「ワークフロー」の選択肢として表示されます。 ＊制限公開機能が有効で、システム管理者のみ表示される項目です" [ref=e5592]:
            - cell "利用申請フラグ" [ref=e5593]
            - cell "デフォルトではチェックなしです。チェックありの場合、アイテム登録画面のコンテンツファイルの「提供方法」の「ワークフロー」の選択肢として表示されます。 ＊制限公開機能が有効で、システム管理者のみ表示される項目です" [ref=e5594]
          - row "GakuNinRDM Flag GakuNinRDMからアイテムを登録するワークフローにするためのフラグです。※GakuNin RDMとの連携は開始前です" [ref=e5595]:
            - cell "GakuNinRDM Flag" [ref=e5596]
            - cell "GakuNinRDMからアイテムを登録するワークフローにするためのフラグです。※GakuNin RDMとの連携は開始前です" [ref=e5597]
          - row "登録先インデックスの指定 デフォルトは「指定なし」です。「指定なし」とした場合、ワークフローで項目入力後にインデックスを指定してアイテムを登録します。インデックスを指定した場合、当該ワークフローで登録されるアイテムはすべて指定したインデックスに登録されます。" [ref=e5598]:
            - cell "登録先インデックスの指定" [ref=e5599]
            - cell "デフォルトは「指定なし」です。「指定なし」とした場合、ワークフローで項目入力後にインデックスを指定してアイテムを登録します。インデックスを指定した場合、当該ワークフローで登録されるアイテムはすべて指定したインデックスに登録されます。" [ref=e5600]
          - row "ストレージロケーション アイテムの保存先ストレージを変更する場合に指定します。指定なしの場合はデフォルトのロケーションを選択します。" [ref=e5601]:
            - cell "ストレージロケーション" [ref=e5602]
            - cell "アイテムの保存先ストレージを変更する場合に指定します。指定なしの場合はデフォルトのロケーションを選択します。" [ref=e5603]
          - row "表示/非表示 ロールごとに当該ワークフローの表示・非表示を指定することができます。" [ref=e5604]:
            - cell "表示/非表示" [ref=e5605]
            - cell "ロールごとに当該ワークフローの表示・非表示を指定することができます。" [ref=e5606]
      - paragraph [ref=e5607]: (3) ［保存］をクリックします。
      - paragraph [ref=e5608]: ワークフローが保存されます。
      - paragraph [ref=e5609]: 【注意事項】
      - paragraph [ref=e5610]: DOIを付与するワークフローを作成したい場合は、「Identifier Grant」のアクションが設定されているフローをワークフローにセットすると、アイテム登録時にDOIの登録する画面に遷移可能となります。
      - heading "4．ワークフローの更新" [level=2] [ref=e5611]
      - paragraph [ref=e5612]: (1) ［ワークフロー］で更新したいワークフロー名をクリックします。
      - paragraph [ref=e5613]
      - paragraph [ref=e5614]: ワークフローの編集画面が表示されます。
      - paragraph [ref=e5615]:
        - text: 手順の詳細は
        - link "「3．ワークフローの登録」(2)" [ref=e5616] [cursor=pointer]:
          - /url: "#m3.4-2"
        - text: 以降を参照してください。
      - heading "5．ワークフローの削除" [level=2] [ref=e5617]
      - paragraph [ref=e5618]: (1) ［ワークフロー］で削除したいワークフロー名をクリックします。
      - paragraph [ref=e5619]: ワークフローの編集画面が表示されます。
      - paragraph [ref=e5620]: (2) ［削除］をクリックします。
      - paragraph [ref=e5621]
      - paragraph [ref=e5622]: ワークフローが削除されます。
      - paragraph [ref=e5623]: ただし、アイテム登録に使用されているワークフローは下記ダイアログが表示され、削除できません。
      - paragraph [ref=e5624]
