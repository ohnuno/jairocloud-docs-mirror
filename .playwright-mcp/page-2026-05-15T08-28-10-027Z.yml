      - heading "1．著者DBについて" [level=2] [ref=e42]
      - paragraph [ref=e43]: 著者名典拠を設定することができます。
      - paragraph [ref=e44]: 著者情報を管理する画面は、［Administration］へアクセスし、［著者DB管理］をクリックして［編集］をクリックすると表示されます。
      - paragraph [ref=e45]:
        - text: 著者名典拠に登録した著者はアイテム個別登録時に［著者DBから入力］から検索し、著者DBに登録している情報を作成者情報として反映し、アイテムと著者DBの著者を紐づける事ができます。
        - text: ※ＷEKO3著者IDは画面から確認出来ません。
        - deletion [ref=e46]: ※著者DBに登録している著者を編集した際も、紐づくアイテムの著者情報は更新されません。
        - text: （2024/1/30、現時点の動作と異なるため訂正）
