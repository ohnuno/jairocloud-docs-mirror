      - heading "３．２．ライセンスまたはエンバーゴの一括更新" [level=3] [ref=e3184]
      - paragraph [ref=e3185]: インデックスに属するアイテムのコンテンツファイルに、ライセンスまたはエンバーゴを一括で更新することができます。
      - paragraph [ref=e3186]: (1) ログイン後［Administration］を選択します。
      - paragraph [ref=e3187]: (2) ［アイテム管理］をクリックして［一括更新］をクリックします。
      - paragraph [ref=e3188]: アイテムのライセンスまたはエンバーゴを一括更新する画面が表示されます。
      - paragraph [ref=e3189]: (3) ［インデックスツリー］でアイテムのライセンスまたはエンバーゴを一括更新するインデックスを選択します。
      - paragraph [ref=e3190]: コミュニティ管理者の場合は［インデックスツリー］には管理対象のインデックスのみが表示されます。
      - paragraph [ref=e3191]
      - paragraph [ref=e3192]: (4) ［更新用のフィールド］で［Access Type］または［Licence］を選択します。
      - paragraph [ref=e3193]: 入力欄が表示されます。
      - paragraph [ref=e3194]
      - paragraph [ref=e3195]: (5) ライセンスまたはエンバーゴの値を入力/選択します。
      - paragraph [ref=e3196]
      - paragraph [ref=e3197]: (6) ［アイテムリスト］で更新対象のアイテムを選択します。
      - paragraph [ref=e3198]: すべてのアイテムを選択する場合、［全選択］（［Select All］）をクリックします。個別のアイテムを選択する場合、更新したいアイテムのチェックボックスをクリックします。
      - paragraph [ref=e3199]
      - paragraph [ref=e3200]: (7) ［更新］をクリックします。
      - paragraph [ref=e3201]: 確認ダイアログに選択したアイテムの更新情報が表示されます。
      - paragraph [ref=e3202]
      - paragraph [ref=e3203]: (8) ［Continue］をクリックします。
      - paragraph [ref=e3204]: 確認ダイアログに表示されているアイテムの情報が更新されます。アイテムのバージョンも更新されます。
      - paragraph [ref=e3205]
      - heading "4. アイテムの一括削除" [level=2] [ref=e3206]
      - paragraph [ref=e3207]: (1) ログイン後［Administration］を選択します。
      - paragraph [ref=e3208]: (2) ［アイテム管理］をクリックして［一括削除］をクリックします。
      - paragraph [ref=e3209]: アイテムを一括削除する画面が表示されます。
      - paragraph [ref=e3210]: コミュニティ管理者の場合は［インデックスツリー］には管理対象のインデックスのみが表示されます。
      - paragraph [ref=e3211]
      - paragraph [ref=e3212]: (3) ［インデックスツリー］でアイテムを一括削除するインデックスを選択します。
      - paragraph [ref=e3213]: ［子インデックスのアイテムも削除する］をチェックすると、再帰的に子インデックスに所属するアイテムも削除されます。
      - paragraph [ref=e3214]: (4) ［削除］をクリックします。
      - paragraph [ref=e3215]
      - paragraph [ref=e3216]: (5) ［継続］をクリックするとアイテムの一括削除が実行されます。
      - paragraph [ref=e3217]: アイテムが削除されると、アイテムの旧バージョンもすべて論理削除されます。
      - paragraph [ref=e3218]
