9%29
      - paragraph [ref=e2623]:
        - text: ※ メールソフトが自動で立ち上がらない場合は、以下の設定を変更してください。
        - text: （Windowsの場合）設定 → アプリ → 既定のアプリ → メール → 「MAILTO」のアプリを Outlook、Thunderbird 等に変更。
      - paragraph [ref=e2624]:
        - text: ● 注意事項はこちらをご覧ください：
        - link "https://jpcoar.repo.nii.ac.jp/jpcoarml" [ref=e2625] [cursor=pointer]:
          - /url: https://jpcoar.org/support/communitytools/jpcoar-jairo-cloud-community-ml/
      - paragraph [ref=e2626]: ※ 投稿内容は広く共有される可能性がありますので、パスワード等機密情報は投稿しないようご注意ください。
      - heading "１．アイテム一括登録事前準備（インデックス、アイテムタイプ、ワークフロー）" [level=2] [ref=e2627]
      - paragraph [ref=e2628]: アイテム登録の前にインデックス、アイテムタイプ、ワークフローの作成が必要です。
      - paragraph [ref=e2629]: 詳細は下記を参照してください。
      - paragraph [ref=e2630]:
        - link "インデックス管理" [ref=e2631] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/index-management/
      - paragraph [ref=e2632]:
        - link "アイテムタイプ管理" [ref=e2633] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/itemtype/
      - paragraph [ref=e2634]:
        - link "ワークフロー管理" [ref=e2635] [cursor=pointer]:
          - /url: https://jpcoar.org/support/jairo-cloud/manual/workflow/
      - heading "２．アイテムの一括登録（インポート）" [level=2] [ref=e2636]
      - paragraph [ref=e2637]: ファイルを指定してアイテムを一括登録（インポート）できます。インポートするファイルは、ZIPファイルです。
      - paragraph [ref=e2638]:
        - text: ※CNRIの登録は、CNRI利用申請機関のみ行われます。
        - text: ※DOIの付与は
        - link "国立情報学研究所が取り纏めるJaLC準会員（外部サイトにリンクしています）" [ref=e2639] [cursor=pointer]:
          - /url: https://support.irdb.nii.ac.jp/ja/application/jalc
        - text: のみ可能です。
      - paragraph [ref=e2640]: (1) ログイン後、［Administration］にアクセスします。
      - paragraph [ref=e2641]: (2) ［アイテム管理］をクリックして［インポート］をクリックします。
      - paragraph [ref=e2642]: ［選択］タブにファイルをインポートする画面が表示されます。
      - paragraph [ref=e2643]
      - list [ref=e2644]:
        - listitem [ref=e2645]: 一括登録を実行中に他の端末が［Administration］>［アイテム管理］>［インポート］画面を開いた場合、［他の端末でインポートを実行中です。］メッセージが表示され、新たな一括登録は行えません。
        - listitem [ref=e2646]: 一括登録を実行中にその端末で［Administration］>［アイテム管理］>［インポート］画面を開いた場合（他のブラウザで開いた場合など）、［インポートを実行中です。］メッセージが表示され、新たな一括登録は行えません。
        - listitem [ref=e2647]: 個別のアイテム編集中に一括登録を実施した場合、［該当アイテムが編集中のため更新できません。］メッセージが表示されます。
        - listitem [ref=e2648]: 個別のアイテム削除後に一括登録を実施した場合、［該当アイテムは削除済です。］メッセージが表示されます。
        - listitem [ref=e2649]: ユーザのセッション有効時間を超過した場合でもインポート処理は実行されます。
      - paragraph [ref=e2650]: (3) ［アイテムタイプ］を選択して［ダウンロード］をクリックします。
      - paragraph [ref=e2651]:
        - text: 選択したアイテムタイプのヘッダ情報をTSV形式でダウンロードします。ファイル名は「
        - emphasis [ref=e2652]:
          - text: アイテムタイプ名
          - strong [ref=e2653]: (
          - text: アイテムタイプID**).tsv
        - text: 」です。
      - paragraph [ref=e2654]
      - paragraph [ref=e2655]: 【注意事項】
      - list [ref=e2656]:
        - listitem [ref=e2657]: アイテムタイプリストが取得できない場合、［アイテムタイプリストの取得に失敗しました。］というエラーメッセージが表示されます。
        - listitem [ref=e2658]: アイテムタイプのダウンロード時にエラーが発生した場合、［ダウンロードに失敗しました。］というエラーメッセージが表示されます。
        - listitem [ref=e2659]: 一度にインポートできるファイルサイズの上限は20GBです。
      - paragraph [ref=e2660]: ダウンロードされるアイテムタイプのテンプレートの項目
      - table [ref=e2661]:
        - rowgroup [ref=e2662]:
          - row "行目 説明" [ref=e2663]:
            - columnheader "行目" [ref=e2664]
            - columnheader "説明" [ref=e2665]
        - rowgroup [ref=e2666]:
          - 'row "1行目 アイテムタイプの名称を記載します。1カラム目 ： #ItemType(固定)2カラム目 ： アイテムタイプの名称を記載します。3カラム目 ： アイテムタイプのjsonschemaのURLを記載します。" [ref=e2667]':
            - cell "1行目" [ref=e2668]
            - 'cell "アイテムタイプの名称を記載します。1カラム目 ： #ItemType(固定)2カラム目 ： アイテムタイプの名称を記載します。3カラム目 ： アイテムタイプのjsonschemaのURLを記載します。" [ref=e2669]'
          - row "2行目 各メタデータ項目の内部キーを記載します。出力される項目は以下の通りです。 ID URI ※IndexID[n] ※POS_INDEX[n] ※FEEDBACK_MAIL[n] ※REQUEST_MAIL[n] ※RESEARCHMAP_LINCKAGE[n] PUBLISH_STATUS CNRI DOI_RA DOI EDIT_MODE アイテムタイプに定義されているメタデータ ※nには連番(0〜)が記載されます。" [ref=e2670]:
            - cell "2行目" [ref=e2671]
            - cell "各メタデータ項目の内部キーを記載します。出力される項目は以下の通りです。 ID URI ※IndexID[n] ※POS_INDEX[n] ※FEEDBACK_MAIL[n] ※REQUEST_MAIL[n] ※RESEARCHMAP_LINCKAGE[n] PUBLISH_STATUS CNRI DOI_RA DOI EDIT_MODE アイテムタイプに定義されているメタデータ ※nには連番(0〜)が記載されます。" [ref=e2672]
          - row "3行目 各メタデータ項目のラベルを記載します。メタデータの階層に応じて、各階層のラベルを”.”で連結します。繰り返し可能な項目については、ラベルのサフィックスとして”[“+連番(0〜)+”]”を記載します。" [ref=e2673]:
            - cell "3行目" [ref=e2674]
            - cell "各メタデータ項目のラベルを記載します。メタデータの階層に応じて、各階層のラベルを”.”で連結します。繰り返し可能な項目については、ラベルのサフィックスとして”[“+連番(0〜)+”]”を記載します。" [ref=e2675]
