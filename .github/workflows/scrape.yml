name: Scrape JAIRO Cloud docs

on:
  schedule:
    # 毎日 JST 4:00 (UTC 19:00 前日)
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'scrape: キャッシュ無視で全件再取得'
        required: false
        default: 'false'
        type: boolean
      force_dify_sync:
        description: 'Dify: SHA256一致でも強制同期'
        required: false
        default: 'false'
        type: boolean
      force_gdocs_sync:
        description: 'Google Docs: SHA256一致でも強制同期'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run classify tests
        run: |
          python -m pytest tests/test_classify.py -v

      - name: Restore visited cache
        uses: actions/cache@v4
        with:
          # dify_sync_state.json / gdocs_sync_state.json は git 管理なのでキャッシュ対象から除外
          path: |
            .cache/confluence.json
            .cache/jpcoar.json
          key: scraper-cache-${{ github.run_id }}
          restore-keys: |
            scraper-cache-

      - name: Run scrapers
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          ARGS="--source all --max-pages 300"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scrape.py $ARGS

      - name: Show diff stats
        run: |
          git status
          git diff --stat

      - name: Commit and push if changed
        id: commit_docs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/
          if git diff --cached --quiet; then
            echo "No docs changes."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: auto-update docs ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Dify と Google Docs は独立して実行（一方が失敗しても他方を実行）
      - name: Sync to Dify
        id: sync_dify
        # commit_docs が成功した場合に常時実行（SHA256 差分で効率を保証）
        # DIFY_API_KEY 未設定 or config/dify_targets.json にプレースホルダ残りの場合は SKIP で終了
        if: always() && steps.commit_docs.outcome == 'success'
        continue-on-error: true
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force_dify_sync }}" = "true" ]; then
            ARGS="--force"
          fi
          python scripts/sync_to_dify.py $ARGS

      - name: Sync to Google Docs
        id: sync_gdocs
        # GOOGLE_SERVICE_ACCOUNT_JSON 未設定 or config/gdocs_targets.json にプレースホルダ残りの場合は SKIP で終了
        if: always() && steps.commit_docs.outcome == 'success'
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_SCOPE: ${{ secrets.GOOGLE_DRIVE_SCOPE }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force_gdocs_sync }}" = "true" ]; then
            ARGS="--force"
          fi
          python scripts/sync_to_gdocs.py $ARGS

      - name: Commit sync state
        if: always() && steps.commit_docs.outcome == 'success'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .cache/dify_sync_state.json .cache/gdocs_sync_state.json || true
          if git diff --cached --quiet; then
            echo "No sync state changes."
          else
            git commit -m "chore: update sync state ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git pull --rebase
            git push
          fi

      - name: Check sync results
        # 両 sync の結果を集約し、いずれかが失敗していればジョブ全体を失敗にする
        if: always() && steps.commit_docs.outcome == 'success'
        run: |
          FAILED=false
          if [ "${{ steps.sync_dify.outcome }}" = "failure" ]; then
            echo "::error::Dify sync failed"
            FAILED=true
          fi
          if [ "${{ steps.sync_gdocs.outcome }}" = "failure" ]; then
            echo "::error::Google Docs sync failed"
            FAILED=true
          fi
          if [ "$FAILED" = "true" ]; then exit 1; fi
