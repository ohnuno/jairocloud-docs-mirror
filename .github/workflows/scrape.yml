name: Scrape JAIRO Cloud docs

on:
  schedule:
    # 毎日 JST 4:00 (UTC 19:00 前日)
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'scrape: キャッシュ無視で全件再取得'
        required: false
        default: 'false'
        type: boolean
      force_dify_sync:
        description: 'Dify: SHA256一致でも強制同期'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore visited cache
        uses: actions/cache@v4
        with:
          # dify_sync_state.json は git 管理なのでキャッシュ対象から除外
          path: |
            .cache/confluence.json
            .cache/jpcoar.json
          key: scraper-cache-${{ github.run_id }}
          restore-keys: |
            scraper-cache-

      - name: Run scrapers
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          ARGS="--source all --max-pages 300"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scrape.py $ARGS

      - name: Show diff stats
        run: |
          git status
          git diff --stat

      - name: Commit and push if changed
        id: commit_docs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/
          if git diff --cached --quiet; then
            echo "No docs changes."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: auto-update docs ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync to Dify
        # commit_docs が成功した場合に常時実行（SHA256 差分で効率を保証）
        # changed=false の通常日も実行するが、全ファイル SKIP で数秒で終わる
        # これにより前回 sync 失敗後の recovery が可能になる
        if: always() && steps.commit_docs.outcome == 'success'
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force_dify_sync }}" = "true" ]; then
            ARGS="--force"
          fi
          python scripts/sync_to_dify.py $ARGS

      - name: Commit sync state
        if: always() && steps.commit_docs.outcome == 'success'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .cache/dify_sync_state.json || true
          if git diff --cached --quiet; then
            echo "No sync state changes."
          else
            git commit -m "chore: update dify sync state ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git pull --rebase
            git push
          fi
